const db = [
/* FÁCEIS (40) */
{d:"f",q:"A entrada da glicose nas células ocorre por qual mecanismo?",o:["Difusão simples","Transporte ativo primário","Difusão facilitada mediada por GLUTs","Osmose"],a:2,j:"A glicose é hidrofílica e não atravessa a bicamada livremente, sua entrada ocorre por difusão facilitada mediada por GLUTs[cite: 12]."},
{d:"f",q:"Qual o GLUT estritamente dependente de insulina?",o:["GLUT1","GLUT2","GLUT3","GLUT4"],a:3,j:"O GLUT4 (músculo e tecido adiposo) é estritamente dependente de insulina[cite: 12]."},
{d:"f",q:"A glicólise ocorre integralmente em qual parte da célula?",o:["Citosol","Matriz Mitocondrial","Núcleo","Lisossomo"],a:0,j:"A glicólise ocorre integralmente no citosol[cite: 12]."},
{d:"f",q:"Qual o saldo líquido de ATP gerado por molécula de glicose na glicólise?",o:["1 ATP","2 ATP","4 ATP","32 ATP"],a:1,j:"O saldo líquido total da glicólise é 2 Piruvatos + 2 ATP + 2 NADH[cite: 12]."},
{d:"f",q:"Quantos ATPs são consumidos na Fase Preparatória da glicólise?",o:["1 ATP","2 ATP","4 ATP","Nenhum"],a:1,j:"A Fase Preparatória consome 2 ATP para fosforilar a glicose[cite: 12]."},
{d:"f",q:"Na glicólise, a molécula de glicose (6 carbonos) é clivada em duas moléculas de quantos carbonos?",o:["2 carbonos","3 carbonos (trioses)","4 carbonos","1 carbono"],a:1,j:"A glicose é clivada em duas trioses de alta energia[cite: 12]."},
{d:"f",q:"Como se chama a síntese de ATP independente da cadeia respiratória e do oxigênio?",o:["Fosforilação oxidativa","Transporte de elétrons","Fosforilação em nível de substrato","Glicogenólise"],a:2,j:"Fosforilação em nível de substrato é a síntese de ATP independente da cadeia respiratória e do oxigênio[cite: 12]."},
{d:"f",q:"A adição de grupo fosfato aos intermediários da glicólise serve para:",o:["Facilitar sua saída da célula","Permitir a difusão simples","Aprisionamento celular","Converter ATP em glicose"],a:2,j:"A adição de carga negativa impede que cruzem a membrana, mantendo-os dentro do citosol (aprisionamento)[cite: 12]."},
{d:"f",q:"Qual enzima da glicólise catalisa a reação que compromete definitivamente a molécula com a degradação glicolítica?",o:["Hexoquinase","Fosfofrutoquinase-1 (PFK-1)","Aldolase","Enolase"],a:1,j:"A PFK-1 converte F-6-P em F-1,6-BP, sendo o ponto de controle limitante e irreversível que compromete a molécula com a via[cite: 12]."},
{d:"f",q:"A fermentação lática reduz o piruvato a lactato com qual objetivo principal?",o:["Produzir oxigênio","Gerar mais 30 ATPs","Reoxidar o NADH acumulado a NAD+","Sintetizar glicose"],a:2,j:"A redução do piruvato consome o NADH para reoxidá-lo a NAD+, permitindo que a glicólise continue gerando 2 ATP[cite: 12, 13]."},
{d:"f",q:"O Efeito Pasteur descreve que o consumo de glicose é maior em condições:",o:["Aeróbicas","Anaeróbicas","Quentes","Alcalinas"],a:1,j:"O consumo de glicose é significativamente maior em anaerobiose porque o rendimento de ATP é muito menor (apenas 2 ATPs)[cite: 12, 13]."},
{d:"f",q:"Qual bactéria fermenta carboidratos produzindo ácido lático que desmineraliza o esmalte dentário?",o:["E. coli","Mycobacterium tuberculosis","Streptococcus mutans","Staphylococcus aureus"],a:2,j:"Bactérias anaeróbicas como o Streptococcus mutans fermentam carboidratos no biofilme, provocando a cárie[cite: 12, 13]."},
{d:"f",q:"Como as moléculas cruzam a Membrana Mitocondrial Externa (MME)?",o:["Ela é impermeável a tudo","Através de porinas","Por transporte ativo com ATP","Apenas via GLUT4"],a:1,j:"A MME é permeável a pequenas moléculas devido a proteínas formadoras de canais chamadas porinas[cite: 12, 13]."},
{d:"f",q:"A Membrana Mitocondrial Interna (MMI) é descrita como:",o:["Altamente permeável a íons","Cheia de porinas","Rigorosamente impermeável à maioria dos íons e moléculas polares","Inexistente em humanos"],a:2,j:"A MMI é rigorosamente impermeável a íons (incluindo H+), exigindo transportadores específicos[cite: 12, 13]."},
{d:"f",q:"A descarboxilação oxidativa do piruvato conecta a glicólise a qual ciclo?",o:["Ciclo da Ureia","Ciclo de Calvin","Ciclo de Krebs","Ciclo de Cori"],a:2,j:"O complexo PDH converte piruvato em Acetil-CoA, conectando a glicólise ao Ciclo de Krebs[cite: 12]."},
{d:"f",q:"A descarboxilação oxidativa do piruvato gera quais produtos principais?",o:["Glicose e O2","Acetil-CoA, CO2 e NADH","ATP e FADH2","Lactato e NAD+"],a:1,j:"Gera Acetil-CoA, CO2 e NADH[cite: 12, 13]."},
{d:"f",q:"No início do Ciclo de Krebs, o Acetil-CoA condensa-se com qual molécula para formar o Citrato?",o:["Piruvato","Oxaloacetato","Malato","Fumarato"],a:1,j:"O Acetil-CoA (2C) condensa-se com o Oxaloacetato (4C) para formar o Citrato (6C)[cite: 12, 13]."},
{d:"f",q:"Quantas moléculas de FADH2 são geradas em uma volta do Ciclo de Krebs?",o:["Nenhuma","Uma","Duas","Três"],a:1,j:"A enzima Succinato desidrogenase gera 1 FADH2 por volta[cite: 12]."},
{d:"f",q:"Qual enzima do Ciclo de Krebs está firmemente ligada à MMI?",o:["Citrato sintase","Malato desidrogenase","Succinato desidrogenase","Aconitase"],a:2,j:"A Succinato desidrogenase é a única enzima integralmente ligada à MMI[cite: 12, 13]."},
{d:"f",q:"Onde se localizam os complexos da Cadeia Transportadora de Elétrons (CTE)?",o:["Núcleo","Citosol","Membrana Mitocondrial Externa","Membrana Mitocondrial Interna"],a:3,j:"A CTE está embutida na MMI[cite: 12, 13]."},
{d:"f",q:"Qual é o aceptor final de elétrons na cadeia respiratória?",o:["Cianeto","Água","Oxigênio molecular (O2)","NADH"],a:2,j:"O Complexo IV transfere elétrons para o Oxigênio molecular (O2), reduzindo-o a H2O[cite: 12, 13]."},
{d:"f",q:"A Ubiquinona (Coenzima Q) tem a característica de ser:",o:["Proteína periférica gigante","Lipossolúvel e móvel na MMI","Presa na membrana externa","Enzima do citosol"],a:1,j:"A Ubiquinona é um carreador lipossolúvel não proteico que difunde-se livremente no núcleo da MMI[cite: 12, 13]."},
{d:"f",q:"A Hipótese Quimiosmótica explica a síntese de ATP pelo bombeamento de:",o:["Cálcio","Prótons (H+)","Sódio","Elétrons livremente no citosol"],a:1,j:"A energia da CTE bombeia prótons, e o retorno deles pela ATP sintase impulsiona a síntese de ATP[cite: 12, 13]."},
{d:"f",q:"O gás cianeto (CN) atua bloqueando qual processo?",o:["Apenas a glicólise","A Cadeia Transportadora de Elétrons (Complexo IV)","A entrada de glicose no GLUT1","A enzima aldolase"],a:1,j:"O cianeto liga-se ao Citocromo a3 no Complexo IV, paralisando o fluxo de elétrons para o oxigênio[cite: 12, 13]."},
{d:"f",q:"A termogenina (UCP-1) atua no tecido adiposo marrom promovendo a liberação de:",o:["Lactato","ATP puro","Glicose","Calor"],a:3,j:"A termogenina desacopla a fosforilação, liberando a energia do gradiente de prótons como calor[cite: 12, 13]."},
{d:"f",q:"Segundo a Teoria Endossimbiótica, mitocôndrias originaram-se de:",o:["Lisossomos defeituosos","Retículo endoplasmático liso","Procariontes aeróbicos primitivos englobados","Vírus invasores"],a:2,j:"Mitocôndrias vieram de bactérias aeróbicas englobadas por eucariontes primitivos[cite: 12, 13]."},
{d:"f",q:"Qual é o único complexo da CTE que NÃO bombeia prótons?",o:["Complexo I","Complexo II","Complexo III","Complexo IV"],a:1,j:"O Complexo II transfere elétrons do FADH2 para a Ubiquinona, mas não bombeia prótons[cite: 12, 13]."},
{d:"f",q:"A glicólise pode ocorrer na ausência de oxigênio?",o:["Sim, acoplada à fermentação","Não, oxigênio é obrigatório","Sim, mas sem produzir ATP","Apenas no tecido adiposo marrom"],a:0,j:"Sim, em anaerobiose, o NADH é reoxidado pela lactato desidrogenase, mantendo o ganho de 2 ATP[cite: 12, 13]."},
{d:"f",q:"A descarboxilação do piruvato gera ATP diretamente?",o:["Sim, 1 ATP","Sim, 2 ATP","Não gera ATP diretamente (0 ATP)","Sim, 32 ATP"],a:2,j:"A PDH gera Acetil-CoA, CO2 e NADH, mas 0 ATP direto[cite: 12]."},
{d:"f",q:"O Citocromo c transfere elétrons do Complexo III para qual complexo?",o:["Complexo I","Complexo II","Complexo IV","ATP Sintase"],a:2,j:"O Complexo III transfere elétrons para o Citocromo c, que os leva ao Complexo IV[cite: 12]."},
{d:"f",q:"Os ribossomos encontrados dentro das mitocôndrias são estruturalmente semelhantes aos:",o:["Do retículo endoplasmático rugoso humano","Bacterianos (70S)","Virais","Do Complexo de Golgi"],a:1,j:"Eles são 70S, semelhantes aos bacterianos, suportando a teoria endossimbiótica[cite: 12, 13]."},
{d:"f",q:"O ATP formado na reação da Fosfoglicerato Quinase (na glicólise) é exemplo de:",o:["Fosforilação oxidativa","Transporte passivo","Fosforilação em nível de substrato","Fermentação"],a:2,j:"A transferência de fosfato do 1,3-BPG para o ADP é fosforilação em nível de substrato[cite: 12, 13]."},
{d:"f",q:"Qual a consequência do acúmulo de ácido lático no biofilme dentário?",o:["Aumento do pH e limpeza","Morte do S. mutans apenas","Redução do pH local e desmineralização do esmalte","Aumento na produção de oxigênio"],a:2,j:"O ácido reduz o pH provocando desmineralização do esmalte e iniciando a cárie[cite: 12, 13]."},
{d:"f",q:"Qual carreador atua trocando ATP sintetizado na matriz por ADP do citosol?",o:["Termogenina","GLUT4","Translocase de Nucleotídeos de Adenina (ANT)","Porinas"],a:2,j:"O antiporte ANT exporta ATP4- e importa ADP3-[cite: 12, 13]."},
{d:"f",q:"Quantos piruvatos são formados a partir de UMA molécula de glicose?",o:["Nenhum","Um","Dois","Quatro"],a:2,j:"A glicose (6C) é clivada para formar 2 piruvatos (3C)[cite: 12, 13]."},
{d:"f",q:"As mitocôndrias possuem DNA próprio?",o:["Não, usam apenas o do núcleo","Sim, DNA circular sem histonas","Sim, RNA viral de fita simples","Não, dependem de plasmídeos"],a:1,j:"Sim, possuem genoma próprio com DNA circular semelhante ao bacteriano[cite: 12, 13]."},
{d:"f",q:"O saldo total de NADH produzido por uma glicose, considerando Glicólise + PDH + Krebs (2 voltas), é:",o:["2 NADH","4 NADH","6 NADH","10 NADH"],a:3,j:"São 2 (glicólise) + 2 (PDH) + 6 (Krebs) = 10 NADH[cite: 12]."},
{d:"f",q:"A quebra da ligação do Acetil-CoA provê energia para qual etapa?",o:["Fim do Ciclo de Krebs","Bomba de prótons do Complexo II","Primeira reação do Ciclo de Krebs (Citrato Sintase)","Ativação do GLUT4"],a:2,j:"A quebra da ligação tioéster expele energia suficiente para acionar a primeira reação do Ciclo[cite: 12, 13]."},
{d:"f",q:"A doença beribéri afeta as descarboxilações oxidativas devido à deficiência de qual vitamina?",o:["Vitamina C","Vitamina A","Vitamina B1 (Tiamina)","Vitamina K"],a:2,j:"A deficiência de tiamina (Vitamina B1) causa falta da coenzima TPP[cite: 13]."},
{d:"f",q:"O ATP age sobre a enzima PFK-1 como um:",o:["Cofator obrigatório","Ativador alostérico","Inibidor alostérico","Desacoplador"],a:2,j:"Níveis altos de ATP inibem a PFK-1, desacelerando a glicólise[cite: 12, 13]."},

/* MÉDIAS (40) */
{d:"m",q:"O GLUT2 encontrado no fígado e células pancreáticas atua como sensor de glicose porque:",o:["Possui alta afinidade por glicose","Possui baixa afinidade (alto Km), respondendo proporcionalmente à hiperglicemia","Precisa de insulina para sair da vesícula","Bombeia glicose contra o gradiente"],a:1,j:"A baixa afinidade (alto Km) garante que ele capte mais glicose apenas nos picos pós-prandiais[cite: 12, 13]."},
{d:"m",q:"Na glicólise, a enzima Gliceraldeído-3-fosfato desidrogenase (G3PDH) produz:",o:["1 ATP","1 FADH2","NADH e liga um Pi livre ao substrato","Apenas água"],a:2,j:"A G3PDH oxida o G3P, incorpora um Pi e reduz o NAD+ a NADH (fosforilação oxidativa do G3P)[cite: 12, 13]."},
{d:"m",q:"O ponto de 'não retorno' e passo limitante da glicólise é a reação catalisada pela:",o:["Piruvato quinase","Aldolase","Fosfofrutoquinase-1 (PFK-1)","Citrato sintase"],a:2,j:"A reação da PFK-1 compromete a molécula de glicose definitivamente com a degradação glicolítica[cite: 12, 13]."},
{d:"m",q:"A Frutose-2,6-bisfosfato tem qual efeito sobre a PFK-1?",o:["Inibe a PFK-1","Destrói a PFK-1","Ativa fortemente a PFK-1","Transforma em FADH2"],a:2,j:"A Frutose-2,6-bisfosfato é um ativador alostérico forte da PFK-1[cite: 12]."},
{d:"m",q:"A clivagem da Frutose-1,6-Bisfosfato gera quais duas trioses?",o:["Oxaloacetato e Citrato","Piruvato e Lactato","G3P e DHAP","NADH e FADH2"],a:2,j:"A aldolase divide a F-1,6-BP em Diidroxiacetona-fosfato (DHAP) e Gliceraldeído-3-Fosfato (G3P)[cite: 12, 13]."},

{d:"m",q:"Quais intermediários/sinalizadores ativam a enzima PFK-1?",o:["ATP e Citrato","AMP, ADP e Frutose-2,6-bisfosfato","NADH e FADH2","Cianeto e DNP"],a:1,j:"AMP e ADP sinalizam depleção energética e ativam a PFK-1[cite: 12, 13]."},
{d:"m",q:"O Complexo da Piruvato Desidrogenase (PDH) requer quais coenzimas?",o:["Somente NAD+ e FAD","Apenas ATP e GTP","TPP, Ácido Lipoico, CoA-SH, FAD e NAD+","Vitamina C e Ferro"],a:2,j:"Requer Pirofosfato de Tiamina (TPP), Ácido Lipoico, CoA, FAD e NAD+[cite: 12, 13]."},
{d:"m",q:"O que são as reações anapleróticas no Ciclo de Krebs?",o:["Reações de destruição do ciclo","Reações de preenchimento que repõem intermediários usados em vias biossintéticas","Apenas a formação de lactato","As inibições pelo ATP"],a:1,j:"Como o ciclo é anfibólico, os intermediários retirados precisam ser repostos (ex: por Piruvato Carboxilase)[cite: 12, 13]."},
{d:"m",q:"Na Cadeia Transportadora, os elétrons do FADH2 entram por qual via?",o:["Complexo I","Complexo II","Direto no Complexo IV","Pela ATP Sintase"],a:1,j:"O FADH2 é oxidado pelo Complexo II (Succinato Desidrogenase) e transfere elétrons para a Ubiquinona[cite: 12, 13]."},
{d:"m",q:"Quantos prótons o Complexo I bombeia para o espaço intermembranas por par de elétrons do NADH?",o:["2 H+","4 H+","Nenhum","10 H+"],a:1,j:"O Complexo I bombeia 4 H+ da matriz para o espaço intermembranas[cite: 12]."},
{d:"m",q:"O Complexo III (Citocromo bc1) transfere elétrons para:",o:["O Oxigênio","A Ubiquinona","O Citocromo c","O Complexo I"],a:2,j:"Transfere os elétrons da Ubiquinona para o Citocromo c e bombeia 4 H+[cite: 12, 13]."},
{d:"m",q:"Como o cálcio (Ca2+) atua no Ciclo de Krebs?",o:["Atua como um forte inibidor","Ativa a Isocitrato Desidrogenase e a a-Cetoglutarato Desidrogenase","Bloqueia a Succinato Desidrogenase","Causa o Efeito Pasteur"],a:1,j:"O Ca2+ sinaliza contração muscular e atua como ativador dessas enzimas-chave no ciclo[cite: 12, 13]."},
{d:"m",q:"A proteína termogenina (UCP-1) permite que prótons voltem à matriz mitocondrial sem passar por onde?",o:["Pelo Complexo IV","Pelo canal da ATP Sintase","Pela Glicólise","Pelo núcleo celular"],a:1,j:"A UCP-1 cria um canal alternativo, dissipando o gradiente sem sintetizar ATP pela ATP Sintase, liberando calor[cite: 12, 13]."},
{d:"m",q:"No miocárdio, sob oxigenação, por que o consumo de glicose é menor do que em hipoxia (Efeito Pasteur)?",o:["Porque a respiração aeróbica rende muito mais ATP, exigindo menos glicose para manter a energia","Porque o coração para de bater","Porque o O2 destrói a glicose","Porque a glicólise é mais eficiente sem oxigênio"],a:0,j:"Em via aeróbica, 1 glicose rende 30-32 ATP; em anaeróbica, só 2 ATP. Logo, com oxigênio, menos glicose é necessária[cite: 12, 13]."},
{d:"m",q:"Na glicólise, a conversão de fosfoenolpiruvato (PEP) a piruvato é catalisada por qual enzima?",o:["Hexoquinase","Piruvato quinase","Enolase","Lactato desidrogenase"],a:1,j:"A piruvato quinase catalisa a transferência do fosfato do PEP para o ADP, gerando piruvato e ATP[cite: 12, 13]."},
{d:"m",q:"A Succinil-CoA sintetase gera ATP (ou GTP) através de qual mecanismo?",o:["Fosforilação oxidativa mitocondrial direta","Transporte passivo","Fosforilação em nível de substrato no Ciclo de Krebs","Divisão celular"],a:2,j:"A enzima promove fosforilação em nível de substrato, aproveitando a energia da quebra da ligação tioéster[cite: 12, 13]."},
{d:"m",q:"A molécula de Frutose-1,6-bisfosfato formada pela PFK-1 também é historicamente conhecida como:",o:["Éster de Harden-Young","Lactato desidrogenase","Substrato de Mitchell","Termogenina"],a:0,j:"Também é conhecida como éster de Harden-Young[cite: 13]."},
{d:"m",q:"O transporte de fosfato inorgânico (Pi) para dentro da matriz mitocondrial aproveita o gradiente de:",o:["Sódio","Cloro","Prótons (H+), via simporte","Elétrons livremente"],a:2,j:"O Transportador de Fosfato usa o co-transporte (simporte) de H+ a favor do gradiente de pH para importar Pi[cite: 12, 13]."},
{d:"m",q:"As proteínas ferro-enxofre (Fe-S) na CTE têm a função de:",o:["Produzir CO2","Transferir um elétron por vez internamente nos complexos","Estocar ATP","Destruir o cianeto"],a:1,j:"Centros Fe-S operam transferindo um elétron por vez nos Complexos I, II e III[cite: 12, 13]."},
{d:"m",q:"O grupo prostético FMN (Flavina Mononucleotídeo) está localizado exclusivamente em qual complexo da CTE?",o:["Complexo II","Complexo IV","Complexo I","ATP sintase"],a:2,j:"O FMN está exclusivamente no Complexo I, sendo o primeiro aceptor de elétrons do NADH[cite: 12, 13]."},
{d:"m",q:"Quais enzimas geram NADH no Ciclo de Krebs?",o:["Apenas a Citrato Sintase","Isocitrato desidrogenase, a-Cetoglutarato desidrogenase e Malato desidrogenase","Succinato desidrogenase e Fumarase","Aconitase e Enolase"],a:1,j:"NADH é gerado em 3 pontos por volta do ciclo, catalisado por essas três desidrogenases[cite: 12, 13]."},
{d:"m",q:"A cardiolipina é um lipídeo exclusivo e importante para qual estrutura celular?",o:["Parede da bactéria","Membrana Mitocondrial Interna (MMI)","Complexo de Golgi","Retículo liso"],a:1,j:"A MMI possui a cardiolipina, lipídeo exclusivo que atua na impermeabilidade e ancoragem dos complexos da CTE[cite: 13]."},
{d:"m",q:"Durante a hipoxia, a conversão de piruvato a lactato regenera o NAD+ citosólico. O que aconteceria se essa reação não ocorresse?",o:["A célula explodiria","A glicólise pararia por falta de NAD+ para a enzima G3PDH","Mais ATP seria gerado no ciclo de krebs","A célula migraria para a circulação"],a:1,j:"Se o NADH não fosse oxidado, a glicólise pararia rapidamente por depleção do pool de NAD+ necessário à G3PDH[cite: 12, 13]."},
{d:"m",q:"O 2,4-dinitrofenol (DNP) é classificado na cadeia respiratória como um:",o:["Inibidor do Complexo IV","Doadores de elétrons","Agente desacoplador químico","Enzima glicolítica"],a:2,j:"O DNP é um desacoplador que permeabiliza a MMI a prótons, gerando calor em vez de ATP[cite: 12, 13]."},
{d:"m",q:"No antiporte catalisado pela Translocase de Nucleotídeos de Adenina (ANT), o movimento é movido por:",o:["ATP extra","Bomba de sódio","Gradiente de potencial elétrico transmembrana","Apenas gravidade"],a:2,j:"O transporte de ATP4- (sai) por ADP3- (entra) gera déficit de 1 carga negativa, sendo impulsionado pelo potencial elétrico (exterior positivo)[cite: 12, 13]."},
{d:"m",q:"O Citocromo c é uma proteína:",o:["Periférica solúvel que se move no espaço intermembranar","Integral e imóvel do Complexo I","Apenas encontrada em plantas","Que bombeia 10 prótons"],a:0,j:"É uma proteína periférica que viaja entre os Complexos III e IV no espaço intermembranar[cite: 13]."},
{d:"m",q:"O fluoreto impede a cárie pois inibe qual enzima bacteriana da glicólise?",o:["Hexoquinase","Enolase","G3PDH","Aldolase"],a:1,j:"O fluoreto inibe especificamente a enolase bacteriana, interrompendo a produção de ácido láctico[cite: 13]."},
{d:"m",q:"O que são as porinas presentes na MME?",o:["Lipídeos de ataque viral","Proteínas integrais formadoras de canais que conferem alta permeabilidade","Enzimas que quebram ATP","Desacopladores naturais de calor"],a:1,j:"As porinas (ou VDAC) tornam a Membrana Externa permeável a moléculas menores que ~5000 Da[cite: 12, 13]."},
{d:"m",q:"As reações do Ciclo de Krebs ocorrem em qual compartimento celular exato?",o:["Matriz Mitocondrial (exceto uma enzima)","Citosol puro","Lúmen do Retículo","Lisossomos"],a:0,j:"Ocorrem na matriz mitocondrial, exceto a succinato desidrogenase que fica aderida à MMI[cite: 12, 13]."},
{d:"m",q:"Cianeto e Monóxido de Carbono (CO) se ligam especificamente a qual grupo para causar asfixia celular?",o:["Ao fósforo do ADP","Ao magnésio da hexoquinase","Ao ferro do grupo heme a3 presente no Complexo IV","À Ubiquinona no Complexo I"],a:2,j:"Ligam-se fortemente ao Fe do citocromo a3 (Complexo IV), bloqueando a redução do O2[cite: 12, 13]."},
{d:"m",q:"O Ciclo de Krebs gera CO2 como resíduo. Quantos mols de CO2 são gerados por cada MOLÉCULA DE GLICOSE (2 piruvatos) a partir da entrada da PDH até o fim de Krebs?",o:["1 CO2","2 CO2","4 CO2","6 CO2"],a:3,j:"São 2 CO2 na etapa da PDH + 4 CO2 nas duas voltas do Ciclo = 6 CO2 totais[cite: 12]."},
{d:"m",q:"Qual o efeito do NADH sobre o Ciclo de Krebs?",o:["Aumenta a atividade da piruvato carboxilase","Atua como inibidor alostérico nas desidrogenases, sinalizando alta energia","Estimula o Efeito Pasteur","Ativa a síntese de mais piruvato"],a:1,j:"Níveis altos de NADH e ATP indicam excesso de energia e inibem o ciclo[cite: 12, 13]."},
{d:"m",q:"O Complexo IV (Citocromo Oxidase) bombeia quantos prótons para o espaço intermembranar por par de elétrons do NADH?",o:["2 H+","4 H+","6 H+","Nenhum"],a:0,j:"O Complexo IV bombeia 2 H+ para cada par de elétrons que reduz meio O2[cite: 12]."},
{d:"m",q:"A fosforilação oxidativa em si (Complexo V) utiliza a subunidade mecânica F0 e F1. Onde ocorre a rotação?",o:["A passagem de prótons flui pela F0, induzindo conformações catalíticas na F1","A F1 bombeia prótons e F0 reduz o oxigênio","O citosol faz a F0 girar","A glicose empurra a F1"],a:0,j:"A passagem de prótons pela F0 no canal transmembrana faz ela girar, o que força a F1 a sintetizar ATP a partir de ADP + Pi[cite: 12, 13]."},
{d:"m",q:"Qual enzima anaplerótica converte diretamente o piruvato em oxaloacetato na presença de ATP e CO2?",o:["Citrato sintase","Aldolase","Piruvato carboxilase","Enolase"],a:2,j:"A piruvato carboxilase reabastece o ciclo convertendo piruvato em oxaloacetato[cite: 12, 13]."},
{d:"m",q:"No Complexo IV, qual componente central atua nas transferências do grupo heme?",o:["Íons Cobre (Cu) e Ferro (Fe)","Apenas Fósforo","Lítio","Apenas Sódio"],a:0,j:"O Complexo IV contém centros de cobre (CuA, CuB) e hemes de ferro[cite: 12, 13]."},
{d:"m",q:"A quebra do carboidrato F-1,6-BP em trioses é chamada clivagem aldólica. Ela é a reação inversa do quê?",o:["Uma descarboxilação","Uma fosforilação primária","Uma condensação aldólica","Uma fermentação ácida"],a:2,j:"A enzima Aldolase cliva através do inverso químico de uma condensação aldólica[cite: 13]."},
{d:"m",q:"Qual carreador atua no Complexo I e pode doar/receber até 2 elétrons e 2 prótons?",o:["Citocromo c","Ubiquinona apenas","FMN (Flavina Mononucleotídeo)","GTP"],a:2,j:"O FMN é um grupo prostético ligado a flavoproteínas no Complexo I com essa capacidade[cite: 13]."},
{d:"m",q:"Na CTE, os elétrons fluem baseados em qual propriedade física?",o:["Tamanho da molécula","Afinidade por água","Potenciais redox crescentes","Cor da proteína"],a:2,j:"Os complexos são ordenados por potenciais redox crescentes, os elétrons caem para potenciais maiores exergonicamente[cite: 12, 13]."},

/* DIFÍCEIS (40) */
{d:"d",q:"Se um fígado for tratado com Rotenona, qual coenzima deixará de ter seus elétrons oxidados na Cadeia Respiratória?",o:["Apenas o FADH2","O NADH, pois a rotenona bloqueia especificamente o Complexo I","Apenas o Citocromo c","Nenhuma"],a:1,j:"A rotenona é um inibidor específico do Complexo I, impedindo a oxidação do NADH mitocondrial[cite: 13]."},
{d:"d",q:"A Antimicina A e a Rotenona são toxinas potentes. Entre as duas, qual causa o bloqueio mais amplo e severo na cadeia mitocondrial?",o:["A Rotenona, pois afeta o FADH2.","A Antimicina A, pois ela inibe o Complexo III, criando um gargalo que paralisa tanto o fluxo do Complexo I (NADH) quanto do Complexo II (FADH2).","Ambas são idênticas.","Nenhuma afeta o homem."],a:1,j:"A Antimicina A (bloqueia o III) paralisa a cadeia por completo, enquanto a Rotenona (bloqueia o I) ainda permite que elétrons do FADH2 entrem pelo II[cite: 13]."},
{d:"d",q:"De acordo com a estequiometria quimiosmótica, qual é o rendimento exato de ATP gerado por um mol de NADH e FADH2 oxidados na CTE?",o:["NADH: 3 ATP | FADH2: 2 ATP","NADH: 1 ATP | FADH2: 1 ATP","NADH: 2,5 ATP | FADH2: 1,5 ATP","NADH: 4 ATP | FADH2: 3 ATP"],a:2,j:"O NADH bombeia 10H+ gerando 2,5 ATP (10/4). O FADH2 bombeia apenas 6H+ gerando 1,5 ATP (6/4)[cite: 13]."},
{d:"d",q:"Em células tumorais, observa-se o 'Efeito Warburg'. Como essas células suprem sua altíssima demanda energética operando preferencialmente via glicólise anaeróbica mesmo com O2 presente?",o:["Elas usam lipídeos como única fonte.","Elas param de se dividir.","O tumor hiperexpressa (via fator HIF-1a) transportadores GLUT e enzimas glicolíticas, captando massivamente a glicose para compensar o baixo rendimento de 2 ATP/glicose.","Elas produzem ATP do ar atmosférico sem enzimas."],a:2,j:"Para compensar a ineficiência de 2 ATP, o tumor consome glicose de forma acelerada via hiperexpressão induzida por HIF-1a[cite: 13]."},
{d:"d",q:"Pacientes com beribéri apresentam deficiência grave de tiamina. Bioquimicamente, isso afeta a via energética porque:",o:["Impede a difusão da glicose.","A Tiamina é precursora do TPP, cofator OBRIGATÓRIO para a Piruvato Desidrogenase e a-Cetoglutarato Desidrogenase. Sem TPP, o piruvato e o a-cetoglutarato acumulam-se e não oxidam no ciclo.","O ciclo de Krebs acelera matando a célula.","A inibição ocorre no complexo IV da água."],a:1,j:"A falta de TPP (Vitamina B1) bloqueia a descarboxilação oxidativa, causando acúmulo patológico no sangue de piruvato e a-cetoglutarato[cite: 13]."},
{d:"d",q:"Por que doenças genéticas causadas por ausência TOTAL (homozigótica) de uma enzima do ciclo de Krebs no adulto são extremamente raras na literatura médica humana?",o:["Porque o corpo produz a enzima sozinho pela dieta.","O Ciclo é uma via anfibólica vital. A ausência de qualquer enzima causa colapso bioenergético severo precoce, resultando em letalidade embrionária (aborto), inviabilizando o nascimento do indivíduo afetado.","Porque os humanos não usam o ciclo de Krebs.","Porque o fígado regenera mitocôndrias falhas."],a:1,j:"Mutações nulas em vias centrais vitais causam inviabilidade do embrião; não há adultos sem o CK ativo[cite: 13]."},
{d:"d",q:"A oxidação de um grupo simples de 2 carbonos (acetil) ocorre por um ciclo complexo de 8 etapas catalíticas e condensação com o oxaloacetato, em vez de uma oxidação direta a CO2, porque:",o:["A oxidação direta e simples a CO2 geraria combustão, inviabilizando acoplar e fracionar as quebras exergônicas graduais em carregadores de elétrons (NADH/FADH2) com eficiência para a célula captar a energia lentamente.","Porque o oxaloacetato é um açúcar que precisa ser queimado e destruído rápido.","Para gastar mais energia apenas e esquentar a célula.","Não há motivo biológico real no metabolismo biológico universal celular."],a:0,j:"O ciclo fraciona as quebras, permitindo a conservação controlada da energia sem perda brusca, conectando as vias metabólicas de forma eficiente e modular[cite: 13]."},
{d:"d",q:"Qual o papel da fluoretação das águas na prevenção da desmineralização dentária através da bioquímica celular bacteriana?",o:["O flúor branqueia o dente apenas.","O fluoreto inibe quimicamente a enzima enolase do S. mutans, bloqueando a glicólise. Com a via travada na placa, a bactéria não fermenta piruvato a ácido láctico, o que impede a queda de pH local que destruiria os cristais de hidroxiapatita.","O flúor acelera a enzima aldolase.","O flúor quebra as porinas da mitocôndria na bactéria."],a:1,j:"Bloqueando a enolase, bloqueia-se o ácido láctico oriundo da fermentação bacteriana, salvando o esmalte[cite: 13]."},
{d:"d",q:"Na descarboxilação oxidativa do piruvato pelo Complexo PDH, 5 coenzimas atuam orquestradamente. O Papel do Lipoato (Ácido Lipoico) é:",o:["Transferir apenas fosfato.","Atuar no braço flexível central que recebe o grupo acetil após a TPP e transfere-o oxidando-o simultaneamente à Coenzima A.","Inibir o processo quando há muito ATP.","Transformar o citosol em matriz orgânica nuclear."],a:1,j:"O Lipoato é uma das 5 coenzimas do complexo PDH atuando na transferência do grupo acetila com propriedades redox centrais e estruturais[cite: 12, 13]."},
{d:"d",q:"Como o íon Cálcio (Ca2+) integra a atividade mecânica contrátil com o metabolismo energético nas mitocôndrias?",o:["Ele destrói as porinas causando lise celular severa apoptótica incontrolável.","A concentração de cálcio (que estimula a contração) entra na mitocôndria ativando alostericamente a isocitrato desidrogenase e a a-cetoglutarato desidrogenase, acelerando o ciclo de Krebs para suprir instantaneamente a demanda explosiva de ATP da contração gerada.","Ele paralisa a glicólise de forma imediata.","O cálcio atua como um veneno respiratório semelhante ao cianeto letal."],a:1,j:"O cálcio é um forte ativador alostérico positivo das duas desidrogenases centrais do ciclo[cite: 12, 13]."},
{d:"d",q:"No Complexo II, por que não há bombeamento de prótons para a força próton-motriz?",o:["Ele não tem membranas em contato com o espaço intermembranar suficiente ou um mecanismo conformacional capaz de acoplar a oxidação do FADH2 ao translocamento de prótons contra o gradiente celular.","Porque o FADH2 não tem elétrons.","Ele bombeia cálcio ao invés de H+.","Porque ele foi inibido pela termogenina do urso natural."],a:0,j:"O Complexo II transfere os elétrons, mas seu acoplamento termodinâmico não possui a força para bombear H+ transmembrana contra o forte gradiente elétrico, apenas passando os elétrons à ubiquinona[cite: 12, 13]."},
{d:"d",q:"O transporte do Fosfato inorgânico (Pi) que alimenta a ATP Sintase aproveita-se de qual aspecto da força próton-motriz?",o:["Do gradiente de potencial elétrico puramente negativo matriz dependente iônico da carga global celular nuclear de actina miosina.","Da componente de diferença de pH (química); o Transportador de Fosfato usa a força de um próton (H+) voltando para a matriz como simporte (cotransporte) para 'arrastar' o íon fosfato para dentro simultaneamente pelo canal e gradiente estabelecido exergônico da bomba da cadeia ativa.","Do empuxo de ATP que sai da mitocôndria para o sangue sistêmico do oxigênio.","Da água da matriz celular no ciclo aquático."],a:1,j:"O gradiente de prótons (Delta pH) induz a volta do H+, cujo transporte é usado para carregar o Pi como um simporte associado para a síntese química da F1[cite: 12, 13]."},
{d:"d",q:"Explique bioquimicamente a ação asfixiante do Cianeto e do CO na cadeia:",o:["Eles rompem os pulmões instantaneamente causando sangue espumoso mortal irreversível.","Eles inativam o ferro do citocromo a3 do Complexo IV. Como os elétrons ficam retidos e não reduzem o O2, a fila da CTE toda engarrafa instantaneamente de elétrons, parando o bombeamento de H+, a dissipação letal da quimiosmose condena o cérebro em minutos sem ATP celular local.","Eles bloqueiam a entrada da glicose no GLUT1 do cérebro maduro e criança.","Eles matam apenas bactérias patogênicas sem tocar no corpo animal do homem."],a:1,j:"Eles bloqueiam a entrega final de elétrons. Sem o escoamento no aceptor (O2), os complexos saturam-se (NADH não descarrega) paralisando o metabolismo aeróbico por asfixia letal celular global sistêmica[cite: 12, 13]."},
{d:"d",q:"O mecanismo da Enzima Gliceraldeído-3-Fosfato Desidrogenase (G3PDH) apresenta uma peculiaridade notável em sua catálise. Qual é?",o:["Ela consome GTP e gasta energia líquida do ciclo sem retorno térmico.","Ela acopla a reação exergônica (remoção de elétrons/oxidação) para puxar um Fosfato inorgânico (Pi) livre do citosol e fixá-lo na molécula de forma rica e instável, criando uma ligação acil-fosfato de alta energia (1,3-bisfosfoglicerato) que fará a primeira síntese rentável de ATP logo em seguida no segundo passo enzimático acoplado sem gastar 1 ATP antes da célula.","Ela quebra 6 carbonos em 3.","Ela funciona no vácuo celular."],a:1,j:"Fosforilação oxidativa do G3P une oxidação de C com adição de fosfato livre gerando uma molécula extremamente energética pronta a fosforilar ADP depois[cite: 12, 13]."},
{d:"d",q:"Qual enzima da Glicólise cliva o F-1,6-BP (com 6 carbonos) em DHAP e G3P (com 3C cada)?",o:["Gliceraldeído 3-fosfato desidrogenase","Fosfofrutoquinase-2","Aldolase, realizando a lise por meio de uma reação exatamente inversa a uma condensação aldólica (clivagem aldólica limpa metabólica do açúcar)","Enolase catalisando desidratações moleculares em água"],a:2,j:"A clivagem do anel fosfatado desestabilizado ao meio é conduzida pela enzima Aldolase[cite: 12, 13]."},
{d:"d",q:"A Termogenina (UCP-1) no tecido adiposo marrom desvia os prótons para gerar calor contínuo em mamíferos hibernantes. Por que a energia vira calor ao invés de ATP na UCP-1?",o:["Porque os elétrons do citocromo queimam os lipídios fisicamente no núcleo gerando calor solar radiante estático no animal dormindo no gelo na neve na natureza da vida.","Porque ela permeabiliza a membrana criando um 'furo' ou via alternativa onde o fluxo passivo massivo do gradiente forte de H+ se dissipa sem encontrar e passar pelas pás enzimáticas mecânicas da F0 da ATP Sintase, convertendo a energia da força quimiosmótica inteira na Primeira Lei termodinâmica de perda irradiada térmica.","Ela apenas atritou as membranas com cristais minerais duros de carboidrato denso amido congelado.","Não é calor orgânico e biológico."],a:1,j:"UCP-1 é um desacoplador fisiológico que 'desperdiça' o gradiente para termogênese[cite: 12, 13]."},
{d:"d",q:"Em uma cultura celular onde a cadeia respiratória e o ATP mitocondrial funcionam perfeitamente, os altos estoques do próprio ATP produzido pelo ciclo de Krebs e ATP Sintase sinalizarão qual comando retrógrado (feedback) no Citosol à enzima PFK-1?",o:["Elas enviarão O2 de volta à via inicial respiratória celular citosólica.","O ATP citosólico agirá como Inibidor Alostérico potente se ligando ao sítio da PFK-1 (modulador negativo), mudando sua conformação para diminuir a afinidade da enzima pelo substrato e pausar a glicólise que estava gerando mais piruvato sem necessidade (Efeito repressor regulatório lógico biológico) da via inteira basal de consumo limitante central da célula orgânica livre.","O ATP vai se fundir a glicose gerando um novo polímero tóxico estrutural fibroso.","Não haverá efeito nenhum no ciclo."],a:1,j:"Níveis elevados de ATP, citrato e NADH no sistema dizem 'Temos energia sobrando!'. Eles atuam como repressores bloqueando as vias catabólicas no passo limitante da PFK-1[cite: 12, 13]."},
{d:"d",q:"A transferência de elétrons da enzima Succinato Desidrogenase ocorre pelo intermédio obrigatório de qual tipo de centro químico dentro do Complexo II antes de alcançar o lipídeo móvel da Ubiquinona?",o:["O oxigênio molecular reativo simples livre volátil radical tóxico nocivo biológico e oxidativo natural celular das organelas fechadas nucleares orgânicas plásticas e rígidas estáticas e impermeáveis isoladas quimicamente de todos sistemas vitais.","Os elétrons são conduzidos por grupos do cofactor ligado FAD reduzido (FADH2) e cruzam aglomerados organizados de Proteínas contendo centros operacionais elétricos de Ferro-Enxofre (Fe-S) que passam um elétron solto metódico por vez diretamente na membrana lipossolúvel (Ubiquinona Q).","A molécula de lactato desidrogenase isolada do citosol limpo líquido fluido polar orgânico da mitocôndria animal pura.","Eles pulam como raios livres no líquido intermembranas espaciais das cristas finas curvas da organela mitocondrial das plantas e parasitas minúsculos orgânicos terrestres verdes autotróficos fixadores gasosos."],a:1,j:"O Complexo II retém o FAD que transfere elétrons do succinato e os repassa através de centros de proteínas Ferro-Enxofre até a coenzima Q (Ubiquinona)[cite: 12, 13]."},
{d:"d",q:"Como o NADH citosólico gerado na Glicólise lida com a membrana impermeável das mitocôndrias maduras ativas nos tecidos em oxigenação profunda e não hipóxicos?",o:["Ele destrói o polo da membrana criando furos largos grandes massivos elétricos e rompe a mitocôndria.","Como o NADH não entra (MMI rigorosamente seletiva), ele joga seus elétrons nas 'lançadeiras' (shuttles metabólicos) que reduzem outros compostos que podem atravessar e reoxidar dentro (rendendo ATP sem a molécula do citosol entrar de fato inteira).","O NADH viaja pela porina da membrana interna tranquilamente como a água na osmose passiva da via aquaporina simples.","Ele se transforma magicamente em lactato em aerobiose completa em pessoas saudáveis."],a:1,j:"A MMI é impermeável aos nucleotídeos de nicotinamida grandes; os elétrons do NADH citosólico precisam de vias auxiliares bioquímicas de ponte (shuttles, ex: malato-aspartato) para penetrar no oxigênio aeróbico eficiente terminal mitocondrial[cite: 12, 13]."},
{d:"d",q:"Qual foi a constatação chave da hipótese quimiosmótica do bioquímico pesquisador Peter Mitchell nos anos da bioquímica estrutural do Nobel de 78 para resolver a síntese do ATP?",o:["O sangue flui pelas veias levando ATP direto da respiração pulmonar torácica grossa para o encéfalo humano em capilares sistêmicos cardíacos coronários elétricos puros.","Que a oxidação na CTE não gera intermediários de alto potencial químico fosforilado (como na glicólise local via ligação acil substrato) e sim uma pura 'força próton-motriz' eletromotora transmembrânica do gradiente da matriz, e que o canal mecânico catalítico condensador de fosfatos orgânicos da ATP Sintase F0 F1 opera como um motor iônico quebrado que capta o fluxo das subunidades mecânicas do íon H+ retornando sob demanda fisiológica ativa e funcional contínua.","Que as bactérias não tem mitocôndrias e não tem vida celular operante ativa de divisão do ribossomo delas bacteriano estrito 70s circular orgânico livre celular membranoso procariota do solo orgânico aerado superficial úmido denso e sombreado pelas árvores tropicais e subtropicais na terra orgânica biológica limpa natural ecossistêmica rural.","Que a termogenina substitui o Complexo V da via das plantas."],a:1,j:"Ele descobriu o acoplamento eletroquímico quimiosmótico mediando a CTE com a F1[cite: 12, 13]."},

{d:"d",q:"O transporte de elétrons mediado pelo Citocromo c tem qual peculiaridade espacial na estrutura mitocondrial na CTE?",o:["Ele fica cravado no DNA bacteriano circular.","É uma proteína periférica altamente solúvel que não atravessa a bicamada lipídica. Ele move-se ou desliza tangencialmente apenas na face ou espaço intermembranar transportando os elétrons recebidos pelas bombas fixas do Citocromo bc1 do complexo três até encontrar as estruturas ativas de cobre do complexo quatro oxidase terminal onde o cianeto age fatalmente.","Ele é uma molécula de lipídeo gigante no núcleo da membrana densa pesada de gordura hidrocarbonada saturada e insaturada da bicamada da célula orgânica.","Ele flutua livremente no sangue das artérias espessas vermelhas do coração miocárdico e dos pulmões bronquiolares tubulares gasosos puros aéreos elásticos sistêmicos de animais tetrápodes vertebrados mamíferos."],a:1,j:"O Citocromo C atua como uma lançadeira móvel e solúvel no espaço intermembranas conectando os complexos isolados da membrana impermeável cardiolipina-dependente[cite: 12, 13]."},
{d:"d",q:"O que ocorre com a regulação hormonal estrita pós-prandial sistêmica e o transporte molecular polar de glicose dependente do receptor do GLUT4?",o:["Ele fica em poros simples e nunca sai.","A molécula hidrofílica não passa. O transportador fica retido e sequestrado em vesículas secretórias citoplasmáticas dormindo no repouso inerte metabólico jejum do adipócito; com o pico da sinalização endócrina da Insulina nas cascatas do pâncreas, ele transloca brutalmente para a membrana fusionando-se nela, permitindo captação máxima muscular maciça reduzindo a hiperglicemia vascular do mamífero diabético ou saudável regulado organicamente e sistemicamente na homeostase de vida vital do ser humano adulto ou criança.","Ele transforma insulina em gorduras totais sem regulação no sistema hepático exclusivo de receptores de cálcio.","O GLUT4 independe da insulina e trabalha ativado pelo veneno dinitrofenol orgânico químico."],a:1,j:"O GLUT4 é o único estritamente translocado via estímulo insulínico do repouso citoplasmático[cite: 12, 13]."},
{d:"d",q:"O grupo Fosfato adicionado às moléculas como a Glicose-6-Fosfato na preparação, cumpre papel além da conservação energética. O papel na enzima é:",o:["Afiar a membrana celular mecânica dura fibrosa de queratina celulose do fungo e levedura natural parasita viva em animais vivos autotróficos livres.","Funcionar como sítio ou 'ponto de fixação e reconhecimento'. O grupo fosfato adiciona enorme carga tridimensional estrutural volumosa negativa repulsiva que se encaixa especificamente (aumentando a afinidade) nos bolsões catalíticos e alostéricos dos sítios das enzimas ativas das vias.","Destruir os lipídeos biliares no intestino fino longo humano absortivo curvo espasmódico natural humano animal da evolução.","Transformar RNA celular polar fita dupla helicoidal da fenda cromossômica cromatina do genoma bacteriano em ATP simples na célula lisa fina clara limpa de organelas com lise plasmática letal fatal no núcleo espesso das bactérias patogênicas orgânicas isoladas gram positivas grossas das cepas agressivas mortais endêmicas rurais."],a:1,j:"Reconhecimento enzimático - o fosfato confere encaixes de alta afinidade nos sítios catalíticos da fase da via limitante[cite: 12]."},
{d:"d",q:"A quebra do ácido pirúvico (Piruvato) com liberação da molécula do CO2 metabólico primário expiratório dos vertebrados pulmonares superiores advém primeiramente por via do sistema de complexos do:",o:["Fermentação heterolática no estômago gástrico do humano liso.","Associação de três grandes blocos enzimáticos do Complexo enorme da Piruvato Desidrogenase na matriz, ativada por Acetil-CoA e bloqueada por NADH, promovendo a primeira liberação do dióxido descarboxilativo irreversível de exalação acoplada a Tiamina Pirofosfato (vitamina B1 deficitária na beribéri) conectando aos pilares de Krebs a acetila ativada.","Apenas na termogenina calórica da célula termogênica isolada basal sem controle da medula.","Em reações isoladas raras anapleróticas puras endergônicas citosólicas inversas sem carbono circulante."],a:1,j:"O piruvato é oxidado via PDH emitindo CO2; os blocos complexos reagem em sequência estrita com 5 vitaminas ativas[cite: 12, 13]."},
{d:"d",q:"Na reação onde a Succinil-CoA transfere o fosfato do intermediário na matriz mitocondrial (via anfibólica de precursores puros de Krebs ciclo central) formando GTP ou ATP pela quebra da tioéster instável orgânica, observamos na literatura exata a:",o:["Morte do tecido muscular fibroso esquelético vermelho rápido tipo dois das penas dos braços das pernas das coxas musculosas de mamíferos selvagens livres caçadores bípedes primatas terrestres com respiração bucal e gástrica basal das células intestinais musculares polares.","Única Fosforilação em Nível de Substrato geradora energética nucleotídica (FNS) existente em todo o ciclo do ácido cítrico de Krebs livre.","Fosforilação puramente osmótica de membrana quimiosmótica elíptica paralela radial rotatória acoplada sem ligação física enzimática dos hidrogênios puros polares iônicos.","Quebra enzimática aldólica inversa reversa espelhada simétrica condensada catalítica anabolizante citoplasmática do açúcar pentose glicolítico terminal."],a:1,j:"A succinil-CoA sintetase gera o GTP por fosforilação em nível de substrato, o único direto[cite: 12, 13]."},
{d:"d",q:"Na reação exergônica severa da PFK-1 irreversível alostérica, por que moléculas como ADP e AMP agem acelerando a curva da velocidade das subunidades em vez de inibir como o ATP e Citrato das membranas energizadas ricas saturadas nas células musculares tensas?",o:["Porque ATP e citrato atraem CO2 tóxico e venenoso letal celular.","Níveis altos citoplasmáticos flutuantes instáveis moleculares orgânicos do AMP e ADP em resposta à quebra contínua e consumo hidrolítico da contração ATPase dos filamentos são 'sinalizadores bioquímicos claros biológicos e metabólicos de alarme de depleção severa' requerendo geração energética aguda de fluxo e induzindo a enzima à forma ativada alostérica plena R.","Eles apenas bloqueiam os glúteos e estômagos do sistema orgânico com cãimbras noturnas dormentes incontroláveis duras.","Porque o AMP é veneno citocromo."],a:1,j:"A lógica alostérica (Ativação por AMP/ADP) reflete a necessidade da célula reverter o esgotamento via aumento de catabolismo[cite: 12, 13]."},
{d:"d",q:"A regulação anfibólica anaplerótica suprema do ciclo oxida intermediários orgânicos polares mas também drena. Qual enzima principal reabastece de forma primária e endergônica as lacunas consumindo molécula carbônica ATP e CO2 na sua operação em situações metabólicas fisiológicas das reações de suporte contínuo mitocondrial nas cristas da matriz biológica celular e orgânica animal viva livre e selvagem de adaptação aos cenários variáveis biológicos naturais?",o:["Apenas a citrato sintase invertida orgânica natural citosólica.","Piruvato carboxilase transaminando o fluxo de oxaloacetato esgotado na síntese periférica.","Aldolase reversa.","Apenas a fosfoglicerato quinase dupla."],a:1,j:"Reações de preenchimento chamadas de anapleróticas são comandadas pela Carboxilase do piruvato ativada metabolicamente quando Krebs esvazia[cite: 12, 13]."},
{d:"d",q:"Por que o modelo de Fissão Binária Autônoma mitocondrial celular ampara uma parte do alicerce genético empírico estrutural da Teoria Endossimbiótica de Margulis evolucionária proposta recentemente dos ribossomos 70S nas organelas eucariotas modernas superiores das células vivas em fungos animais plantas parasitas unicelulares e multicelulares?",o:["Porque a divisão em Fissão das mitocôndrias ocorre paralelamente independentemente dos cronogramas das fases e mitoses centrais complexas cromossomáticas meióticas pesadas e reguladas do núcleo da célula eucariota, replicando seu DNA circular sem histonas espessas organizadas do material bacteriano arcaico isolado.","Porque gera câncer na pele fina solar epidérmica orgânica.","Não tem amparo nenhum empírico claro celular mitocondrial e genético celular estrito das matrizes plásticas e fluidas orgânicas inorgânicas livres vivas vitais.","Porque ribossomos 70s matam o hospedeiro em dias na lise letal necrótica."],a:0,j:"Como a organela divide-se sozinha (como uma bactéria), possui autonomia residual de quando era um ser de vida livre isolado antigamente[cite: 12, 13]."},
{d:"d",q:"O fenômeno Efeito Warburg (não Pasteur, de células normais cardíacas perfundidas com O2 estabilizado medido em volume de sangue constante calórico e mecânico fisiológico sistêmico circulatório) na medicina, implica celularmente no âmbito da proliferação celular neoplásica e anômala da via Glicolítica limitante terminal que:",o:["As mitocôndrias fogem das células tumorais nas fases puras lisas sólidas orgânicas das metástases venosas locais invasivas curativas malignas benignas.","Células de tecido com replicação hiperexpressiva mutante maligna adotam a fermentação pobre em ATP para contornar a biossíntese da molécula de intermediários de carbono anabólicos em hipoxia local usando do HIF-1a para expressar transportadores enormes excessivos massivos das famílias hipertróficas dos GLUTs periféricos para sugar todo o açúcar extracelular viável em ambiente micro patológico.","Os tumores absorvem apenas ar e lipídeos neutros de cadeia curta do leite animal gordo orgânico livre rico rural de campos tropicais.","A fermentação láctica não ocorre em tumores hipóxicos necróticos."],a:1,j:"Tumores usam glicólise anaeróbica mesmo com O2 (Warburg) compensando os ínfimos 2ATPs pela gula extrema em glicose mediada por HIF-1a[cite: 13]."},
{d:"d",q:"O inibidor clássico 'Fluoreto' age bloqueando a fluidez estequiométrica das linhagens cariogênicas. Se a Enolase cai na inibição seletiva, qual é a molécula imediata que não conseguirá ser formada sequencialmente e inviabilizará o final da rota metabólica anaeróbica lática de desmineralização ácida nociva oral dentária na estrutura de hidroxiapatita?",o:["O oxigênio terminal na placa dentária.","A Frutose-2,6-bisfosfato instável rica orgânica pesada volumosa fosforilada citosólica do fígado humano hepático gástrico vascular.","O substrato de altíssima energia fosforilada, o Fosfoenolpiruvato (PEP). Sem PEP, não se faz a reação rentável de Fosforilação Final por Nível de Substrato geradora do ATP celular via a potente ação motriz enzimática desidrogenada quinase do Piruvato e subsequente redução fatal acidogênica letal em massa da dentina calcificada sólida de cálcio fosfato dura.","O DNP desacoplador livre gorduroso tóxico sintético agrícola humano."],a:2,j:"A enolase é o passo imediatamente anterior ao PEP. Sem PEP, não há piruvato e, por corolário, não há ácido lático na boca[cite: 12, 13]."},
{d:"d",q:"No antiporte específico mediado pelo complexo Transportador Translocase de Nucleotídeos da Membrana Interna asilada cardiolipina-dependente, como atua o diferencial de voltagem e carga iônica molecular nos nucleotídeos transportados citosólicos?",o:["A organela perde água livre.","O ambiente elétrico positivo fora da MMI atrai ativamente o substrato super carregado e eletricamente mais pesado do ATP tetranegativo celular interno ($ATP^{4-}$), expulsando-o e compensando com a entrada induzida do componente de nucleotídeo difosfato recarregável e hidrolisado celular periférico muscular cardíaco mais leve, o ($ADP^{3-}$), movido pela atração favorável e não contra o fluxo termodinâmico basal químico mitocondrial polar elétrico isolado estrito.","Apenas cloretos de potássio rolam nas vias osmóticas aquaporínicas polares e lipofílicas das bi-camadas orgânicas nucleares citosólicas eucarióticas espessas e permeáveis aquosas puras do soro plasmático.","O gradiente elétrico atrai a termogenina marrom livre calórica adiposa termogênica isolada invernal animal natural silvestre isolada livre gorda grossa pesada densa do organismo do inverno letal."],a:1,j:"A troca de cargas 4- do ATP que sai pelo 3- do ADP que entra dita a favorabilidade pelo gradiente externo superpositivo da bomba H+ motriz[cite: 12, 13]."},
{d:"d",q:"O transporte do Piruvato orgânico para a Matriz restritiva seletiva da MMI (sem porinas passivas amplas) atua pelas proteínas de nome MPC. Como se traduz a diferença funcional de membranas do transporte desse soluto de três carbonos orgânicos nas camadas isoladas organelares duplas endossimbióticas da célula eucariótica superior oxigenada no aerobioma mitocondrial oxidativo terminal respiratório da via anabólica catabólica mista flexível celular biológica das mitocôndrias dos órgãos musculares vivos humanos na fisiologia tecidual corporal ativa sistêmica?",o:["Ele entra destruindo a célula citoplasmática lisossomal necrótica da enzima ácida.","Ele flutua nas porinas da MME externas grandes fáceis permeáveis livres como um fluxo aquoso osmótico livre difusivo. Porém, choca-se estritamente na parede densa impermeável seletiva restritiva totalitária bi-camada iônica polar repulsiva fechada limpa das MMI precisando da carreadora acoplada protetora transmembranar mediadora catalisadora orgânica seletiva e restrita do metabolismo fechado isolado citosólico e celular oxidativo da CTE das cristas invaginadas organelares.","Não entra, sendo revertido a galactose na urina renal isolada humana rica fluida filtrada orgânica sistêmica do metabolismo celular citosólico dos rins nefróticos da alça espessa de Henle das regiões medulares do néfron vascular tubular cortical renal humano animal exócrino.","O GLUT4 carrega o piruvato pelo corpo."],a:1,j:"O piruvato escoa solto na MME (porinas de baixo filtro) mas bate num muro (MMI) que exige seu Carreador de Piruvato (MPC)[cite: 12, 13]."},
{d:"d",q:"No caso do Efeito Pasteur, em músculo perfundido isolado fisiológico vivo dinâmico intacto monitorado laboratorialmente na bioquímica e bioenergética orgânica tecidual, quando o cientista ativa a passagem do ar com Oxigênio letal aos anaeróbicos puros, o consumo da molécula substrato de seis carbonos 'cai e estabiliza' porque:",o:["O ciclo desliga e apodrece letalmente no ar das vias.","O fluxo exergônico gigante e rentável quimiosmótico da bomba oxidativa da via final da crista interna das organelas se reativa instantaneamente ligando 30 a 32 moles rentáveis limpos químicos puros. Assim, as enzimas alostéricas sinalizadoras sentem alta massiva inibidora rápida de ATP/Citrato alostérico regulador sensível repressor, abrandando imediatamente e violentamente o 'ralo' e gula devoradora massiva citoplasmática basal anaeróbica da PFK1 dos antigos e escassos frágeis parcos residuais 2 mols metabólicos puros glicolíticos.","O O2 é cianeto letal tóxico gasoso na biologia moderna ocidental científica pura da matéria de vida celular.","A lactato forma pontes de carbono tóxicas gasosas orgânicas celulares metabólicas inibitórias reativas sistêmicas ativas citosólicas na matriz orgânica viva de células ricas calóricas."],a:1,j:"Cessar a hipóxia desliga o afogamento em açúcar da célula porque o metabolismo vira uma usina rentável e inibe as vias por alta carga (Efeito Pasteur)[cite: 12, 13]."},
{d:"d",q:"Na enzima Aconitase e no Ciclo biossintético derivado, reações endergônicas do CK exigem ligações instáveis no metabolismo do carbono de via de fluxo biológico universal eucarionte heterotrófico quimiotrófico consumidor calórico natural termodinâmico. O papel da molécula do Lipoato atua sinergicamente na Descarboxilação, mas na enzima Succinato Desidrogenase qual carreador redox flavoproteico é integralmente usado dentro das barreiras?",o:["FMN simples fosfatado citoplasmático.","Somente o Citocromo c periférico citosólico.","FAD e FADH2 atuando fortemente ancorados presos e cravados indissociavelmente nas amarras da estrutura densa orgânica proteica do complexo estrutural estático da membrana interior invaginada biológica da usina mitocondrial das respirações das CTE do Complexo 2 orgânico da fisiologia das cristas isoladas vivas ativas em metabolismo intenso animal tecidual humano orgânico celular.","A Termogenina amarela ucp2 humana e viral. "],a:2,j:"Succinato DH retém o FAD na membrana do Complexo II, sendo o FADH2 incapaz de boiar pelo citosol como o NADH[cite: 12, 13]."},
{d:"d",q:"A teoria de Peter Mitchell sobre o gradiente Quimiosmótico mudou a ciência ao provar que:",o:["As mitocôndrias produzem prótons da poeira inorgânica livre rochosa das camadas litosféricas profundas minerais de sais rochosos das planícies desertas e úmidas dos vales rurais de terra agrícola estéril morta abiótica fria polar dos picos glaciais montanhosos das cordilheiras geladas mortas glaciais polares terrestres dos hemisférios árticos abióticos estáticos das regiões alpinas limpas de oxigênio raro tóxico congelado de neves das chuvas puras do mundo.","Não existem reações acopladas mecanicamente enzimaticamente na CTE formadoras do éster de fosfato forte fosfórico do ATP clássico, mas sim um canal transmembrana estrito rotor gerador de um 'acoplamento energético quimiosmótico puramente mecânico hidrodinâmico e eletroquímico' no rotor molecular protéico das enzimas ATP sintase impulsionadas passivamente pela passagem e refluxo obrigatório fatal forçado osmótico iônico massivo de prótons voltando violentamente exergônicos a favor da força motriz de gradiente do pH terminal das bombas ativas complexas em fluxo de transporte vital metabólico das mitocôndrias respiratórias vitais oxigenadas dos tecidos vivos.","O ATP entra livre por simbiose mútua.","As células usam cianeto como ar limpo leve orgânico na atmosfera rural limpa pura aeróbica estrita celular vital animal sistêmica circulante arterial limpa de gases venenosos letais letais asfixiantes citocromáticos metabólicos celulares das mitocôndrias. "],a:1,j:"Provou a intermediação da síntese de ATP pelo gradiente de prótons sem formar intermediários altamente fosfatados como na glicólise clássica[cite: 12, 13]."}

let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let timerInterval;
let timeLeft = 60;
let selectedLevel = "";

function start(diff) {
    selectedLevel = diff;
    currentQuestions = db.filter(q => q.d === diff).sort(() => Math.random() - 0.5);
    
    if (currentQuestions.length === 0) {
        alert("Não há questões cadastradas para esta dificuldade no banco de dados.");
        return;
    }

    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    
    currentQuestionIndex = 0;
    score = 0;
    loadQuestion();
}

function loadQuestion() {
    const qData = currentQuestions[currentQuestionIndex];
    document.getElementById('prog').innerText = `Questão ${currentQuestionIndex + 1} de ${currentQuestions.length}`;
    document.getElementById('question').innerText = qData.q;
    
    const optionsContainer = document.getElementById('opts');
    optionsContainer.innerHTML = '';
    
    qData.o.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = option;
        btn.onclick = () => checkAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });

    document.getElementById('just').style.display = 'none';
    document.getElementById('next').classList.add('hidden');
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 60;
    document.getElementById('timer').innerText = `00:60`;
    timerInterval = setInterval(() => {
        timeLeft--;
        let s = timeLeft < 10 ? '0'+timeLeft : timeLeft;
        document.getElementById('timer').innerText = `00:${s}`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            lockOptions(false);
        }
    }, 1000);
}

function checkAnswer(selectedIndex, btnElement) {
    clearInterval(timerInterval);
    const qData = currentQuestions[currentQuestionIndex];
    const optionsContainer = document.getElementById('opts');
    const buttons = optionsContainer.querySelectorAll('.option');

    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === qData.a) {
            btn.classList.add('correct');
        } else if (idx === selectedIndex) {
            btn.classList.add('wrong');
        }
    });

    if (selectedIndex === qData.a) {
        score++;
    }

    lockOptions(true);
}

function lockOptions(answered) {
    const btns = document.getElementById('opts').querySelectorAll('.option');
    btns.forEach(b => b.disabled = true);
    
    const justContainer = document.getElementById('just');
    const qData = currentQuestions[currentQuestionIndex];
    
    let prefix = answered ? "" : "<strong style='color:var(--err);'>Tempo esgotado!</strong><br><br>";
    justContainer.innerHTML = prefix + "<strong>Justificativa:</strong> " + qData.j;
    justContainer.style.display = 'block';
    
    document.getElementById('next').classList.remove('hidden');
}

function next() {
    currentQuestionIndex++;
    if (currentQuestionIndex < currentQuestions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('res-screen').classList.remove('hidden');
    document.getElementById('score').innerText = score;
}
</script>
