            background-color: var(--primary-color);

            color: var(--error-color);

</head>

    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 60;

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 60;
        updateTimerText();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerText();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleTimeout();
            }
        }, 1000);
    }

    function updateTimerText() {
        const seconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        document.getElementById('timer-text').innerText = `00:${seconds}`;
    }

    function handleTimeout() {
        const optionsContainer = document.getElementById('options-container');
        const buttons = optionsContainer.querySelectorAll('.option');
        buttons.forEach(btn => btn.disabled = true);
        showJustification(false);
    }

    function loadQuestion() {
        const qData = questions[currentQuestionIndex];
        document.getElementById('progress-text').innerText = `Questão ${currentQuestionIndex + 1} de ${questions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        qData.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = option;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });

        document.getElementById('justification-container').style.display = 'none';
        document.getElementById('next-btn').classList.add('hidden');
        startTimer();
    }

    function checkAnswer(selectedIndex, btnElement) {
        clearInterval(timerInterval);
        const qData = questions[currentQuestionIndex];
        const optionsContainer = document.getElementById('options-container');
        const buttons = optionsContainer.querySelectorAll('.option');

        buttons.forEach((btn, idx) => {
            btn.disabled = true;
            if (idx === qData.answer) {
                btn.classList.add('correct');
            } else if (idx === selectedIndex) {
                btn.classList.add('wrong');
            }
        });

        if (selectedIndex === qData.answer) {
            score++;
        }

        showJustification(true);
    }

    function showJustification(answered) {
        const qData = questions[currentQuestionIndex];
        const container = document.getElementById('justification-container');
        const textElement = document.getElementById('justification-text');
        
        let prefix = answered ? "" : "<strong style='color:red;'>Tempo esgotado!</strong> ";
        textElement.innerHTML = prefix + qData.justification;
        container.style.display = 'block';
        
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-text').innerText = score;
    }
</script>
