<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quiz SUS e Brasil Sorridente</title>
<style>
:root{--bg:#f4f4f9;--txt:#333;--card:#fff;--pri:#0056b3;--hover:#004494;--opt:#e7e9eb;--err:#d32f2f;--suc:#2e7d32;--just:#e3f2fd}
body.dark{--bg:#121212;--txt:#e0e0e0;--card:#1e1e1e;--pri:#64b5f6;--opt:#2c2c2c;--just:#263238}
body{font-family:sans-serif;background:var(--bg);color:var(--txt);margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{background:var(--card);padding:30px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.2);max-width:800px;width:100%}
.header{display:flex;justify-content:space-between;border-bottom:1px solid #ccc;padding-bottom:10px;margin-bottom:20px}
button{padding:12px;border:none;border-radius:5px;cursor:pointer;font-size:16px;font-weight:bold;background:var(--pri);color:#fff;margin:5px 0}
button:hover{opacity:0.9}
.theme-btn{background:transparent;color:var(--txt);border:1px solid #ccc}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option{background:var(--opt);color:var(--txt);text-align:left;border:1px solid #ccc}
.option.correct{background:var(--suc);color:#fff}
.option.wrong{background:var(--err);color:#fff}
.hidden{display:none}
.diff-btns{display:flex;gap:10px}
.diff-btns button{flex:1}
.justification{background:var(--just);padding:15px;border-radius:5px;display:none;margin-bottom:15px}
.timer{color:var(--err);font-weight:bold;font-size:18px}
</style>
</head>
<body>
<div class="container">
    <div class="header"><h2>Quiz SUS & Saúde Bucal</h2><button class="theme-btn" onclick="document.body.classList.toggle('dark')">🌓 Tema</button></div>
    
    <div id="start-screen">
        <p>120 Questões baseadas nos PDFs: Princípios do SUS, Introdução/Legislação e Brasil Sorridente.</p>
        <div class="diff-btns">
            <button style="background:#2e7d32" onclick="start('facil')">Fácil (40)</button>
            <button style="background:#f57c00" onclick="start('medio')">Médio (40)</button>
            <button style="background:#c62828" onclick="start('dificil')">Difícil (40)</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header" style="border:none"><span id="prog" style="color:var(--pri);font-weight:bold"></span><span id="timer" class="timer">01:00</span></div>
        <h3 id="question"></h3>
        <div class="options" id="opts"></div>
        <div class="justification" id="just"></div>
        <button id="next" class="hidden" style="width:100%" onclick="next()">Próxima</button>
    </div>

    <div id="res-screen" class="hidden">
        <h2>Fim!</h2><p>Acertos: <strong id="score"></strong> de 40.</p>
        <button style="width:100%" onclick="location.reload()">Voltar</button>
    </div>
</div>

<script>
const db = [
/* FÁCEIS (40) */
{d:"facil", q:"O princípio do SUS que garante acesso a todos os cidadãos é:", o:["Equidade","Integralidade","Universalidade","Seletividade"], a:2, j:"A universalidade garante que todos têm direito à saúde."},
{d:"facil", q:"Tratar 'desigualmente os desiguais' refere-se ao princípio da:", o:["Universalidade","Equidade","Descentralização","Participação"], a:1, j:"Equidade é focar nas necessidades plurais para reduzir desigualdades."},
{d:"facil", q:"A crítica ao reducionismo biomédico e foco no indivíduo como um todo é a:", o:["Equidade","Integralidade","Regionalização","Hierarquização"], a:1, j:"Integralidade envolve atenção curativa, preventiva e promocional global."},
{d:"facil", q:"Distribuir poder da União para Estados e Municípios chama-se:", o:["Regionalização","Descentralização","Universalização","Hierarquização"], a:1, j:"Descentralização é o repasse de responsabilidades e recursos."},
{d:"facil", q:"Segundo a CF/88, a saúde é um direito de todos e dever:", o:["Do Cidadão","Da Família","Do Estado","Do Mercado"], a:2, j:"Art. 196: A saúde é direito de todos e dever do Estado."},
{d:"facil", q:"O evento marco em 1986 que delineou as bases do SUS foi:", o:["Lei 8080","Revolta da Vacina","8ª Conferência Nacional de Saúde","Criação do INAMPS"], a:2, j:"A 8ª CNS aprovou o conceito de saúde como direito."},
{d:"facil", q:"A gestão do SUS no município cabe:", o:["Ao Ministério da Saúde","À Secretaria Estadual","À Secretaria Municipal de Saúde","Aos Hospitais"], a:2, j:"Direção única municipal cabe à Secretaria de Saúde do município."},
{d:"facil", q:"A lei que regula os Conselhos e Conferências de Saúde é:", o:["Lei 8.080/90","Lei 8.142/90","Constituição Federal","Lei do Brasil Sorridente"], a:1, j:"A Lei 8142/90 trata da participação da comunidade e repasses financeiros."},
{d:"facil", q:"No SUS, a representação dos usuários nos Conselhos deve ser:", o:["25%","50% (Paritária)","75%","100%"], a:1, j:"A paridade garante 50% das vagas aos usuários."},
{d:"facil", q:"A iniciativa privada participa do SUS em caráter:", o:["Exclusivo","Complementar","Obrigatório","Majoritário"], a:1, j:"A CF/88 permite a participação complementar, preferencialmente filantrópica."},
{d:"facil", q:"Qual fundo federal centraliza os repasses do SUS?", o:["Fundo Nacional de Saúde","Fundo de Garantia","Caixa Econômica","Fundo Social"], a:0, j:"Recursos do SUS vão para o Fundo Nacional de Saúde."},
{d:"facil", q:"Antes do SUS, o modelo era focado em:", o:["Atenção preventiva","Medicina privatista e curativa","Saúde universal","Intersetorialidade"], a:1, j:"Era um modelo assistencial privatista e hospitalocêntrico."},
{d:"facil", q:"Uma Conferência de Saúde ocorre a cada:", o:["1 ano","2 anos","4 anos","10 anos"], a:2, j:"A Lei 8142 define a periodicidade de 4 anos."},
{d:"facil", q:"Nas Diretrizes de Saúde Bucal, o termo 'Acolhimento' significa:", o:["Apenas marcar consultas","Receber, escutar e resolver problemas","Internar o paciente","Distribuir escovas"], a:1, j:"Acolhimento é uma postura ética de escuta e responsabilização."},
{d:"facil", q:"HBS em saúde bucal significa:", o:["Higiene Bucal Supervisionada","Hospital Base do Sistema","Hemorragia Bucal Severa","Hierarquia Básica de Saúde"], a:0, j:"HBS é ação preventiva de Higiene Bucal Supervisionada."},
{d:"facil", q:"A prioridade de atendimento imediato em odontologia na atenção básica é:", o:["Estética","Limpeza","Dor, infecção e sofrimento","Clareamento"], a:2, j:"Casos de urgência (dor/infecção) têm prioridade absoluta."},
{d:"facil", q:"A principal forma preventiva de acesso ao flúor (Brasil Sorridente) é:", o:["Dentifrício","Fluoretação das águas","Flúor em gel","Bochecho"], a:1, j:"Fluoretação da água é a medida mais abrangente e justa."},
{d:"facil", q:"Quem presidia o CEBES e a ABRASCO nos anos 70/80?", o:["Empresários","Militares","Movimento da Reforma Sanitária","Planos de Saúde"], a:2, j:"O MRSB articulou-se por meio dessas entidades."},
{d:"facil", q:"O SUS cobra taxas no atendimento?", o:["Sim, de ricos","Não, é gratuito no acesso","Sim, para exames","Apenas cirurgias"], a:1, j:"O financiamento é indireto (impostos), sendo gratuito na ponta."},
{d:"facil", q:"Organizar o sistema em níveis de complexidade (postos -> hospitais) é:", o:["Regionalização","Descentralização","Hierarquização","Equidade"], a:2, j:"Hierarquização organiza o fluxo assistencial por complexidade."},
{d:"facil", q:"Qual a direção do SUS na esfera Federal?", o:["Governo Estadual","Ministério da Saúde","Senado","Prefeitura"], a:1, j:"O MS é o gestor federal."},
{d:"facil", q:"Vigilância Sanitária faz parte do SUS?", o:["Não","Sim","Apenas na teoria","Apenas para alimentos"], a:1, j:"A CF art 200 inclui a execução da Vigilância Sanitária."},
{d:"facil", q:"A saúde bucal no SUS deve integrar-se à:", o:["Iniciativa privada","Equipe de Saúde da Família","Clínica estética","Vigilância armada"], a:1, j:"As diretrizes mandam inserir a saúde bucal na ESF."},
{d:"facil", q:"Visitas domiciliares em odontologia servem para:", o:["Vender produtos","Acompanhar acamados e grupos de risco","Fazer cirurgias","Nada"], a:1, j:"Visam reconhecer riscos e tratar pessoas com dificuldade de locomoção."},
{d:"facil", q:"Os profissionais auxiliares (ASB/TSB) podem fazer ações de educação?", o:["Nunca","Sempre, sob supervisão do CD","Somente médicos podem","Apenas fora do SUS"], a:1, j:"Ações coletivas são preferencialmente feitas por eles sob supervisão."},
{d:"facil", q:"A saúde do trabalhador está incluída no SUS?", o:["Sim (Art. 200)","Não, é do INSS","Apenas para concursados","Nunca esteve"], a:0, j:"CF Art 200 inclui as ações de saúde do trabalhador."},
{d:"facil", q:"A participação popular ocorre de forma:", o:["Consultiva apenas","Permanente e deliberativa (Conselhos)","Provisória","Sazonal"], a:1, j:"Os Conselhos são permanentes e deliberativos."},
{d:"facil", q:"Doação de sangue no SUS permite comercialização?", o:["Sim","Não, é vedada todo tipo de comercialização","Apenas plasma","Sim, no exterior"], a:1, j:"Art 199 § 4º veda comercialização de sangue e tecidos."},
{d:"facil", q:"Para onde vai o dinheiro fundo-a-fundo do SUS?", o:["Conta do Prefeito","Fundos de Saúde (FNS, FES, FMS)","Caixa Econômica Geral","INSS"], a:1, j:"Recursos ficam em contas especiais chamadas Fundos de Saúde."},
{d:"facil", q:"O financiamento do SUS é:", o:["Exclusivo da União","Tripartite (União, Estados, Municípios)","Doações privadas","Loteria apenas"], a:1, j:"A seguridade social é financiada por todas as esferas."},
{d:"facil", q:"O que é CEBES?", o:["Centro Brasileiro de Estudos de Saúde","Comissão Estatal Básica","Conselho Empresarial","Clínica Exclusiva"], a:0, j:"CEBES ajudou a fundar a Reforma Sanitária."},
{d:"facil", q:"Como a saúde era vista ANTES do SUS?", o:["Fenômeno social","Direito","Ausência de doenças","Determinante social"], a:2, j:"Apenas como ausência de doenças, viés biológico."},
{d:"facil", q:"O modelo de Atenção Integral foca em:", o:["Apenas curar","Vigilância e necessidades populacionais","Hospitais caros","Ignorar a prevenção"], a:1, j:"Atuação unificada em prevenção, promoção e cura."},
{d:"facil", q:"As diretrizes de 2004 buscam um Brasil:", o:["Sorridente","Curado","Triste","Edêntulo"], a:0, j:"Política Nacional de Saúde Bucal - Brasil Sorridente."},
{d:"facil", q:"Quem aprova o Plano de Saúde municipal?", o:["O Prefeito","O Conselho Municipal de Saúde","O Juiz","A Polícia"], a:1, j:"O Conselho de Saúde (controle social) deve aprovar."},
{d:"facil", q:"Capital estrangeiro no SUS é:", o:["Liberado sempre","Proibido com fins lucrativos (salvo lei)","Obrigatório","A base do SUS"], a:1, j:"Vedado capital estrangeiro, salvo exceções legais posteriores."},
{d:"facil", q:"As Conferências de Saúde reúnem:", o:["Só médicos","Governo, profissionais, prestadores e usuários","Só o governo","Só empresários"], a:1, j:"São compostas por todos os segmentos da sociedade."},
{d:"facil", q:"O SUS pode fiscalizar bebidas e águas?", o:["Não","Sim, competência constitucional","Somente a água","Somente o álcool"], a:1, j:"Art 200 II: Fiscaliza alimentos, águas e bebidas."},
{d:"facil", q:"O atendimento no SUS é:", o:["Fragmentado","Integral","Seletivo","Opcional"], a:1, j:"A integralidade busca evitar a fragmentação do cuidado."},
{d:"facil", q:"Saúde como dever do Estado exclui dever da família?", o:["Sim","Não, o dever do Estado não exclui o das pessoas/família","A lei não diz","Exclui totalmente"], a:1, j:"O dever estatal não exclui o da família e empresas (Lei 8080)."},

/* MÉDIAS (40) */
{d:"medio", q:"A Lei 8.080/90 dispõe principalmente sobre:", o:["Participação social","Condições para promoção e organização dos serviços","Apenas repasses federais","Privatização"], a:1, j:"Lei 8080 estrutura a promoção, proteção, recuperação e organização do SUS."},
{d:"medio", q:"Quais requisitos os Municípios precisam ter para receber dinheiro do Fundo Nacional (Lei 8142)?", o:["Fundo e Conselho de Saúde, Plano e PCCS","Apenas Fundo","Apenas Prefeito eleito","Não há requisitos"], a:0, j:"Lei 8142 exige Fundo, Conselho, Plano, Relatórios e PCCS."},
{d:"medio", q:"'Organizar a rede por base territorial e indicadores epidemiológicos' refere-se à:", o:["Universalidade","Regionalização","Hierarquização","Vigilância"], a:1, j:"A regionalização mapeia os recursos no território com base epidemiológica."},
{d:"medio", q:"Instituições privadas filantrópicas no SUS têm:", o:["Proibição","Preferência para participar de forma complementar","Exclusividade","Apenas direito a vender remédios"], a:1, j:"A CF/88 dá preferência às filantrópicas no caráter complementar."},
{d:"medio", q:"Na Política Brasil Sorridente, as 'Linhas do Cuidado' significam:", o:["Filas de espera","Ações organizadas por ciclos de vida (criança, idoso) com fluxo garantido","Fio dental","Tratamentos de canal"], a:1, j:"Organizam os fluxos de acordo com as especificidades etárias."},
{d:"medio", q:"O SUS é responsável por formular a política de:", o:["Saneamento básico (participar)","Transporte público","Armamento","Telecomunicações"], a:0, j:"Art. 200 IV: Participar da formulação da política de saneamento básico."},
{d:"medio", q:"Qual a diferença entre Vigilância Epidemiológica e Sanitária?", o:["Epidemiológica foca no meio ambiente; Sanitária em vírus.","Sanitária intervém em riscos do meio/produtos; Epidemiológica foca nos determinantes de doenças.","Não há diferença.","Ambas são exclusivas de portos."], a:1, j:"VS foca em bens/serviços/ambiente; VE foca em surtos/determinantes nas populações."},
{d:"medio", q:"O que são CREOs ou CEOs na saúde bucal?", o:["Hospitais gerais","Centros de Referência de Especialidades (Atenção Secundária)","Postos rurais","Escolas técnicas"], a:1, j:"São unidades secundárias que recebem casos referenciados da atenção básica."},
{d:"medio", q:"As ações de educação em saúde bucal devem ter caráter:", o:["Impositivo","Emancipatório, visando a autonomia do sujeito","Apenas informativo biológico","Terrorista (mostrar cáries)"], a:1, j:"As diretrizes focam num processo pedagógico para a cidadania e autonomia."},
{d:"medio", q:"O trabalho em equipe na saúde bucal opõe-se ao:", o:["Trabalho coletivo","Modelo do CD isolado e curativista","Sistema SUS","Acolhimento"], a:1, j:"Rompe com o isolamento histórico da profissão no consultório."},
{d:"medio", q:"Quem convoca extraordinariamente uma Conferência de Saúde?", o:["Apenas o Presidente","O Poder Executivo ou o Conselho de Saúde","O Juiz","População por abaixo-assinado"], a:1, j:"Lei 8142 diz que pode ser convocada pelo Executivo ou Conselho."},
{d:"medio", q:"A intersetorialidade (Brasil Sorridente) reconhece que a saúde é determinada por:", o:["Genes apenas","Fatores sociais, ambientais e econômicos","Vontade divina","Apenas acesso ao dentista"], a:1, j:"Exige ações além do posto, englobando água, renda, moradia."},
{d:"medio", q:"Na atenção secundária bucal, o foco das Diretrizes de 2004 incluiu de forma inovadora:", o:["Próteses dentárias elementares na rede básica e centros","Cirurgia plástica de nariz","Apenas ortodontia estética","Fechamento de clínicas"], a:0, j:"Inclusão da reabilitação protética para reverter o histórico mutilador."},
{d:"medio", q:"O financiamento da União baseia-se na entrega de recursos:", o:["Aleatória","Regular e automática (Fundo a Fundo)","Apenas se sobrar dinheiro","Em formato de empréstimo com juros"], a:1, j:"O repasse do FNS aos fundos estaduais/municipais é regular e automático."},
{d:"medio", q:"O princípio que determina organizar o SUS de forma a não haver sobreposição administrativa é:", o:["Regionalização","Direção Única","Privatização","Descentralização total sem regras"], a:1, j:"A direção é única em cada esfera de governo."},
{d:"medio", q:"O diagnóstico da comunidade para planejar ações de saúde bucal baseia-se em:", o:["Lucro financeiro","Epidemiologia e territorialização","Opinião do prefeito","Tabelas do convênio privado"], a:1, j:"O perfil epidemiológico dita as prioridades de ação local."},
{d:"medio", q:"A quem compete normatizar e coordenar nacionalmente o Sistema Nacional de Sangue?", o:["Aos estados","À União (direção federal do SUS)","Aos Municípios","Aos hemocentros privados"], a:1, j:"Na Lei 8080, coordenar o sistema de sangue é competência federal."},
{d:"medio", q:"O acesso aos CREOs deve ser feito mediante:", o:["Demanda livre (qualquer um entra)","Referência da Atenção Básica","Pagamento de taxa","Sorteio"], a:1, j:"A atenção secundária recebe fluxos hierarquizados pela primária."},
{d:"medio", q:"Segundo a CF 88, a lei disporá sobre remoção de órgãos vedando:", o:["A doação","A transfusão","A comercialização","A pesquisa"], a:2, j:"É vedado todo tipo de comercialização de órgãos/tecidos."},
{d:"medio", q:"Como a saúde antes de 1988 segmentava a população?", o:["Todos iguais","Previdentes (INAMPS), Indigentes (Saúde Pública/Filantropia) e Ricos (Privado)","Todos indigentes","Só existia sistema privado"], a:1, j:"O INAMPS cobria só carteira assinada; o resto dependia de filantropia/SUS restrito."},
{d:"medio", q:"Segundo as Diretrizes (2004), o vínculo entre profissional e usuário gera:", o:["Dependência química","Corresponsabilização e eficácia terapêutica","Perda de tempo","Lucro"], a:1, j:"Vínculo permite intervenções mais eficazes no território."},
{d:"medio", q:"Nas ações para câncer de boca, a atenção básica deve:", o:["Fazer quimioterapia","Fazer busca ativa, exame preventivo e encaminhar para biópsia","Ignorar casos graves","Atender apenas crianças"], a:1, j:"O posto detecta as lesões iniciais preventivamente e encaminha na rede."},
{d:"medio", q:"As comissões intersetoriais no âmbito nacional são subordinadas ao:", o:["Presidente","Conselho Nacional de Saúde","Ministro","STF"], a:1, j:"A Lei 8080 atrela as comissões intersetoriais ao CNS."},
{d:"medio", q:"A lei 8.080 define Saúde do Trabalhador como:", o:["Licença remunerada","Conjunto de atividades preventivas, de VS e VE, visando saúde laboral","Clínica de repouso","Apenas exames admissionais"], a:1, j:"São ações de vigilância sanitária e epidemiológica no ambiente de trabalho."},
{d:"medio", q:"O papel do Ministério da Saúde na formulação de políticas é:", o:["Executar vacinas nas casas","Planejamento técnico e coordenação nacional","Vender remédios","Atender em UPAs"], a:1, j:"A união foca em formulação e coordenação nacional (macro)."},
{d:"medio", q:"Na representação paritária dos Conselhos (50% usuários), como são divididos os outros 50%?", o:["25% Profissionais, 25% Gestores/Prestadores","50% Políticos","25% Médicos, 25% Enfermeiros","100% Governo"], a:0, j:"A metade institucional divide-se entre trabalhadores (25%) e governo/prestadores (25%)."},
{d:"medio", q:"Qual a função do Relatório de Gestão (Lei 8142)?", o:["Provar que o hospital deu lucro","Comprovar a aplicação de recursos do Fundo e embasar o planejamento","Punir pacientes","Vender equipamentos"], a:1, j:"O relatório presta contas das ações e dos fundos públicos."},
{d:"medio", q:"O modelo de Vigilância à Saúde busca superar:", o:["A saúde pública","O modelo hospitalocêntrico e fragmentado","A prevenção primária","O SUS"], a:1, j:"A vigilância integra promoção e cura contra o velho curativismo."},
{d:"medio", q:"As diretrizes de saúde bucal (2004) criticam o sistema antigo porque ele focava apenas em:", o:["Jovens e prevenção coletiva","Escolares, com ações mutiladoras nos adultos","Prevenção para idosos","Próteses universais"], a:1, j:"Historicamente, o foco era no escolar, deixando os adultos à mercê de extrações."},
{d:"medio", q:"Em saúde bucal, o planejamento do cuidado baseado em risco serve para:", o:["Atender primeiro quem é rico","Aplicar a Equidade, focando intervenções em quem mais necessita","Excluir pacientes do posto","Gastar menos água"], a:1, j:"A classificação de risco operacionaliza a equidade."},
{d:"medio", q:"Segundo a Lei 8.080, incrementar o desenvolvimento científico é atribuição do:", o:["Setor Privado exclusivamente","Sistema Único de Saúde (SUS)","CNPq isoladamente","Ministério da Educação"], a:1, j:"Art. 200: O SUS deve incrementar a pesquisa em sua área de atuação."},
{d:"medio", q:"O SUS formula a política de medicamentos?", o:["Não, apenas distribui","Sim, formula e participa da produção","Isso é tarefa exclusiva das farmácias","Só para o câncer"], a:1, j:"A Lei e a CF dão ao SUS o dever de participar da produção e política de remédios."},
{d:"medio", q:"O que a 8ª CNS teve de inovador na sua composição?", o:["Só teve militares","Foi a primeira com ampla participação da sociedade civil e usuários","Foi feita em sigilo","Durou 10 anos"], a:1, j:"Foi o grande marco democrático da participação popular pré-Constituinte."},
{d:"medio", q:"A gestão estadual do SUS tem papel primário de:", o:["Atender todos no posto de saúde","Coordenar a rede regionalizada e apoiar municípios","Exportar vacinas","Extinguir UPAs"], a:1, j:"O Estado apoia técnica e financeiramente os municípios na rede."},
{d:"medio", q:"O acolhimento deve ser feito por:", o:["Apenas o médico","Toda a equipe multiprofissional","Apenas o recepcionista","Guardas de segurança"], a:1, j:"O acolhimento é postura de toda a equipe na responsabilização da queixa."},
{d:"medio", q:"A CF define as ações de saúde como de:", o:["Monopólio estatal","Relevância Pública","Propriedade privada","Livre mercado sem regras"], a:1, j:"Art. 197 define as ações de saúde como de relevância pública."},
{d:"medio", q:"Participação complementar privada no SUS ocorre mediante:", o:["Acordo verbal","Contrato de direito público ou convênio","Decreto presidencial diário","Leilão"], a:1, j:"Formaliza-se via contrato público ou convênio (Art 199)."},
{d:"medio", q:"As diretrizes bucais exigem conhecer a cultura do usuário para:", o:["Cobrar consultas","Garantir um atendimento eficiente sem imposições verticais (etnocentrismo)","Cumprir cota estatística","Julgar moralmente"], a:1, j:"Reconhecer as diferenças culturais melhora o vínculo e o cuidado."},
{d:"medio", q:"A fluoretação das águas visa diminuir qual agravo epidemiológico?", o:["Câncer bucal","Traumatismo","Cárie dentária em massa","Gengivite"], a:2, j:"É o método populacional mais eficaz contra a cárie."},
{d:"medio", q:"O SUS deve fiscalizar produtos psicoativos?", o:["Não","Sim","Apenas a Polícia Federal","Apenas nas escolas"], a:1, j:"O SUS atua na fiscalização de substâncias psicoativas e tóxicas (Art 200)."},

{d:"dificil", q:"O Artigo 197 da CF afirma que cabe ao Poder Público dispor sobre a saúde, devendo sua execução ser feita:", o:["Exclusivamente pelo Estado","Diretamente ou através de terceiros/Pessoa Física/Jurídica privada","Apenas por ONGs internacionais","Apenas pelas Forças Armadas"], a:1, j:"O Poder Público regulamenta, mas a execução pode ser por terceiros (iniciativa privada)."},
{d:"dificil", q:"Na Lei 8.080, qual o escopo de atuação que rompeu o modelo biomédico?", o:["Comprar hospitais","A inclusão da vigilância ambiental, saúde do trabalhador e política de sangue","Pagar salário aos médicos em dia","Criar planos de saúde privados"], a:1, j:"A Lei amplia a saúde para determinantes sociais, vigilâncias ambientais e do trabalhador."},
{d:"dificil", q:"Por que a 8ª CNS de 1986 não se tornou lei imediatamente?", o:["Foi anulada","Foi um relatório político e diretriz social que precisou da Constituinte de 1988 para virar norma jurídica","Faltou dinheiro","Os médicos vetaram"], a:1, j:"A Conferência propôs as diretrizes que embasaram o texto constitucional dois anos depois."},
{d:"dificil", q:"Segundo as Diretrizes de Saúde Bucal, o termo 'produção do cuidado' exige intervenção na:", o:["Macro-política de Brasília","Micro-política do processo de trabalho, reestruturando as relações de poder no consultório","Taxa Selic","Apenas na compra de resina"], a:1, j:"A produção do cuidado ocorre no encontro vivo profissional-usuário (micro-política)."},
{d:"dificil", q:"A Lei 8142/90 foi criada como complemento rápido à 8080 por qual motivo?", o:["Para criar hospitais novos","Para regulamentar os vetos do Executivo sobre participação popular e repasses fundo a fundo","Para privatizar o sangue","Para extinguir o INAMPS imediatamente"], a:1, j:"O Presidente vetou artigos sociais da 8080, forçando a edição rápida da 8142 para os repasses e conselhos."},
{d:"dificil", q:"Como a Equidade atua perante a Universalidade no SUS?", o:["Elas são antagônicas e excludentes","A Equidade qualifica a Universalidade, garantindo que o acesso igualitário respeite as assimetrias e carências reais de cada grupo","A Equidade destrói a integralidade","A Universalidade proíbe a Equidade"], a:1, j:"Acesso universal, porém com priorização baseada em equidade (riscos maiores)."},
{d:"dificil", q:"Para a Política Brasil Sorridente, a epidemiologia na atenção primária não deve ser apenas estatística acadêmica, mas:", o:["Ferramenta de planejamento para reorganizar a demanda e classificar riscos no território","Mecanismo para pedir mais verbas federais ilícitas","Prova para exames de residência","Substituta dos médicos"], a:0, j:"Os dados epidemiológicos devem nortear a prática diária e reorganização do cuidado."},
{d:"dificil", q:"O que diz o Artigo 199, § 2º sobre recursos para empresas com fins lucrativos?", o:["Podem receber se prestarem bom serviço","É permitida a subvenção em anos pares","É VEDADA a destinação de recursos públicos para auxílios ou subvenções a entidades com fins lucrativos","Podem receber dinheiro do FNS"], a:2, j:"O dinheiro público só financia filantrópicas/sem fins lucrativos (em auxílios), vedando lucrativas."},
{d:"dificil", q:"Se a equipe de saúde bucal (ESB) atua isolada do PSF no município, o que acontece?", o:["Aumenta o lucro","Fere as diretrizes do Ministério que exigem inserção na lógica e território da Saúde da Família (Multiprofissionalidade)","Melhora a especialização","Não tem problema"], a:1, j:"A diretriz exige o fim do isolamento da odontologia em prol da ESF."},
{d:"dificil", q:"O financiamento Tripartite do SUS significa que:", o:["Três bancos pagam a saúde","Três poderes (Exec, Leg, Jud) financiam","União, Estados e Municípios aplicam percentuais mínimos de seus orçamentos constitucionais na saúde","Apenas os três estados mais ricos pagam"], a:2, j:"Todos os três entes federativos compõem o custeio do sistema."},
{d:"dificil", q:"Qual a função das ATF (Aplicação Tópica de Flúor) coletivas segundo a política bucal?", o:["Uso indiscriminado para gastar insumos","Ação estratégica focada em áreas sem flúor na água ou com alto índice de cáries (CPOD alto)","Substituir a escovação diária","Apenas para estética de adultos"], a:1, j:"As ATFs coletivas não são cegas, são pautadas no risco local epidemiológico."},
{d:"dificil", q:"A formulação de políticas de 'saúde do trabalhador' deve englobar (Lei 8080):", o:["Apenas atestados falsos","Revisão de processos produtivos, riscos de maquinário e toxicologia das empresas","Pagamento de INSS apenas","Isolamento dos doentes"], a:1, j:"As ações incluem auditoria ambiental, toxicológica e processos de trabalho que causam doenças."},
{d:"dificil", q:"Ao propor a Reabilitação na Atenção Básica, o Brasil Sorridente exige:", o:["Laboratórios de prótese em clínicas de alto luxo","O CD realizando a fase clínica/moldagem na própria UBS, articulado aos Laboratórios Regionais (LRPD)","Terceirização para convênios","Extinção da dentística"], a:1, j:"Descentraliza a fase clínica para o posto, usando redes de apoio laboratorial regional."},
{d:"dificil", q:"Na lógica do modelo preventivo x curativo, as Diretrizes afirmam que:", o:["Devem existir separados","As ações preventivas, educativas e de recuperação curativa são indissociáveis num mesmo processo de cuidado","A cura deve ser abandonada para focar só na prevenção","A prevenção só funciona em ricos"], a:1, j:"Não há dicotomia; promove-se a clínica integral com profilaxia e cura combinadas."},
{d:"dificil", q:"O SUS detém a responsabilidade direta de formular leis penais sobre drogas?", o:["Sim, é a PF do SUS","Não, o SUS participa da fiscalização e controle de psicoativos, mas a legislação penal é da Justiça","Sim, o Conselho de Saúde julga","O SUS não lida com drogas"], a:1, j:"O controle é sanitário e normativo sobre substâncias, não de código penal puro."},
{d:"dificil", q:"O movimento sanitário foi influenciado nos anos 70 por qual contexto político?", o:["Revolução Francesa","Abertura do Império","Regime Militar (combate ao autoritarismo e demanda por democratização e direitos sociais)","Guerra Fria nos EUA"], a:2, j:"O MRSB nasceu na luta contra a ditadura, unindo saúde à democracia."},
{d:"dificil", q:"O papel do gestor Estadual no financiamento dos CREOs é:", o:["Nenhum","Apenas construir o prédio","Co-financiar (ajudar o município e união) a custear a atenção secundária regionalizada","Pegar o dinheiro para hospitais centrais"], a:2, j:"A responsabilidade financeira nas redes especializadas é compartilhada."},
{d:"dificil", q:"O modelo Privatista-Liberal antes de 88 caracterizava-se por ser:", o:["Hospitalocêntrico, biologista, curativo e tecnicista","Focado na atenção primária rural","Comunitário e xamânico","Apenas focado em idosos"], a:0, j:"Resumia-se na medicina focada na doença instalada e nos grandes equipamentos."},
{d:"dificil", q:"A participação popular no SUS, além de legal, é um mecanismo de:", o:["Atrasar compras","Controle Social do Estado pela sociedade civil, garantindo a democracia do sistema","Isenção de impostos","Vender planos"], a:1, j:"Os conselhos servem para fiscalizar e guiar a gestão estatal (controle social)."},
{d:"dificil", q:"Segundo as Diretrizes, a Saúde Bucal requer intersetorialidade. Um exemplo claro é:", o:["Cirurgia plástica nos dentes","Articulação com a política de Saneamento para garantir flúor na água potável","Comprar cadeiras modernas isoladas","Receitar antibióticos"], a:1, j:"A fluoretação das águas depende fortemente da companhia de saneamento básico."},
{d:"dificil", q:"No Art 198, a diretriz 'atendimento integral, com prioridade para as atividades preventivas':", o:["Proíbe a cura","Veda a internação UTI","Significa que a prevenção é priorizada, mas sem prejuízo dos serviços assistenciais e curativos necessários","Não está na constituição"], a:2, j:"Prioriza a prevenção mas garante toda a assistência curativa exigida."},
{d:"dificil", q:"O Conselho Nacional de Secretários de Saúde (CONASS) atua na esfera:", o:["Municipal","Estadual (reúne secretários estaduais)","Federal puramente política","Privada empresarial"], a:1, j:"O CONASS representa as Secretarias Estaduais de Saúde na governança."},
{d:"dificil", q:"Como a hierarquização protege os Hospitais (Terciários)?", o:["Impedindo pobres de entrar","Filtrando e resolvendo casos simples na Atenção Básica (80% da demanda), evitando superlotação indevida nos hospitais","Dando mais remédios de graça","Não tem impacto nenhum"], a:1, j:"A rede básica absorve a demanda primária, deixando a alta complexidade apenas para casos reais."},
{d:"dificil", q:"Segundo a Lei 8.080, ordenar a formação de RH em saúde serve para:", o:["Garantir altos lucros","Adequar os currículos de medicina/odontologia/enfermagem às necessidades reais de saúde do país (SUS)","Criar exames difíceis no CRM","Pagar impostos sindicalistas"], a:1, j:"O SUS tenta forçar as universidades a formarem profissionais voltados ao perfil do SUS e do Brasil."},
{d:"dificil", q:"Qual princípio justifica tratar uma grávida diabética mais vezes ao mês que uma grávida sadia?", o:["Universalidade Plena","Direção Única","Equidade (necessidade maior = mais recursos)","Vigilância Sanitária"], a:2, j:"A Equidade calibra o recurso de acordo com a vulnerabilidade (risco) individual."},
{d:"dificil", q:"Na CF, 'As instituições privadas poderão participar de forma complementar'. Se houver empate, quem ganha?", o:["Clínicas estéticas americanas","Entidades filantrópicas e as sem fins lucrativos têm preferência de contratação","Hospitais que pagam propina","Qualquer laboratório que fizer o menor preço leiloado"], a:1, j:"A Constituição decreta explícita preferência às filantrópicas."},
{d:"dificil", q:"O que a Reforma Sanitária criticava nas 'Caixas de Aposentadoria e Pensões (CAPs/IAPs)' históricas?", o:["A falta de médicos rurais.","O modelo de mérito: a saúde atrelada unicamente ao trabalho/previdência, excluindo massas de desempregados.","A falta de dinheiro externo do FMI.","O foco preventivo exagerado."], a:1, j:"Crítica severa à segmentação social, onde só quem contribuía para a previdência tinha acesso à medicina."},
{d:"dificil", q:"Em epidemiologia do Brasil Sorridente, o CPOD mede:", o:["Casos Possíveis de Ortodontia Diária.","Cárie, Perdidos e Obturados em Dentes (índice da OMS para mapear a doença cárie).","Código de Profilaxia Oncológica Dental.","Central de Próteses Odontológicas Distritais."], a:1, j:"CPO-D é o índice epidemiológico balizador das condições e metas de saúde bucal."},
{d:"dificil", q:"Qual a posição do SUS sobre as medicinas alternativas (Práticas Integrativas)?", o:["Proibição sumária pelo CRM e leis federais.","São reconhecidas e incorporadas à rede (acupuntura, fitoterapia) dentro do conceito de integralidade.","Permitidas só no setor privado pagante.","Ignoradas pela Lei 8080."], a:1, j:"A Integralidade abarca outras racionalidades médicas validadas (Política PNPIC)."},
{d:"dificil", q:"Segundo as diretrizes de 2004, o que significa a 'rutura com o modelo assistencial do programa incremental'?", o:["Parar de atender escolas públicas.","Sair do foco restrito em Escolares (onde ocorria as extrações sistemáticas em massa nos jovens sem cuidar do ciclo vital completo) para atender todas as faixas etárias.","Demissão de dentistas nas prefeituras.","Cobrança de mensalidades nas UBS."], a:1, j:"O antigo modelo incremental focava em crianças e ignorava gestantes, adultos e idosos (que acabavam mutilados)."},
{d:"dificil", q:"Como a vigilância epidemiológica (VE) deve agir perante uma pandemia no SUS?", o:["Isolar o país sem critérios ou diagnósticos e focar em repasses financeiros para comprar asilos privados estaduais.","Prover informações atualizadas sobre a ocorrência e distribuição das doenças (determinantes) e recomendar medidas de controle/prevenção pertinentes na rede (Lei 8080).","Deletar o banco de dados.","Lavar as ruas com flúor e anestésicos sob comando do MS."], a:1, j:"A VE é definida pela Lei 8080 como conjunto de ações de detecção de alterações para recomendar proteção coletiva."},
{d:"dificil", q:"Para o repasse 'fundo a fundo' da União ocorrer, os fundos municipais devem:", o:["Ser vinculados a bancos estrangeiros privados.","Ter aprovação do conselho regional de medicina local de base para liberar a verba do Fundo Nacional (FNS) por portaria única na receita municipal tributária estadual.","Funcionar como contas especiais, administradas pela Secretaria de Saúde, sob fiscalização obrigatória do respectivo Conselho de Saúde (Lei 8142).","Não precisar de conselhos."], a:2, j:"O repasse só existe pela estruturação administrativa dos fundos controlados pelos conselhos sob gestão do Executivo sanitário local."},
{d:"dificil", q:"Por que a 'Inclusão da Prótese Dentária' foi um marco na Política Brasil Sorridente?", o:["Porque o Governo Federal assumiu o papel histórico das antigas clínicas e reduziu as cáries nas escolas municipais.","Porque o Brasil possuía milhões de idosos e adultos edêntulos (mutilados pelo sistema antigo) e não oferecia acesso público para a mastigação e estética básica.","Porque gerou lucros.","Porque os planos exigiram exclusão."], a:1, j:"A reabilitação pagou a imensa dívida social do Estado em relação às mutilações do modelo curativo excludente anterior."},
{d:"dificil", q:"O princípio do SUS que impede a descontinuidade do cuidado do posto até a UTI é:", o:["Universalidade de acesso seletivo federal corporativo e hospitalocêntrico previdenciário do INSS rural da união governamental estatal militar.","Princípio da Descentralização da arrecadação tributária dos prefeitos paulistas da federação do CEBES histórico de 1980 sanitário.","A Integralidade articulada pela Hierarquização das linhas de cuidado e protocolos de referência e contrarreferência (garantia do trajeto na rede).","O princípio do mercado restrito."], a:2, j:"Integralidade em sua vertente macro-organizacional garante que o usuário transite da UBS até a UTI em fluxos coordenados de encaminhamento contínuo."},
{d:"dificil", q:"Na lógica do modelo preventivo x curativo, as Diretrizes afirmam que (Revisão 2):", o:["Devem existir separados em prédios distintos.","As ações preventivas, educativas e de recuperação curativa são indissociáveis num mesmo processo de cuidado (Práxis única).","A cura deve ser abandonada para focar só na profilaxia teórica da saliva.","A prevenção não existe no SUS."], a:1, j:"A política moderna funde promoção e cura no mesmo encontro clínico."},
{d:"dificil", q:"Qual a importância das plenárias da 8ª Conferência Nacional de Saúde para a política nacional? (Revisão)", o:["Anularam a atuação do MS.","Foram a base documental política e social que o Movimento da Reforma Sanitária utilizou para redigir a seção de seguridade social na Constituição de 1988.","Destruíram os postos de saúde de vacina infantil.","Não tiveram validade jurídica e falharam."], a:1, j:"A 8ª CNS foi a espinha dorsal política e técnica dos textos do constituinte de 1988 sobre o SUS público e universal."},
{d:"dificil", q:"Se um hospital privado não tem leito SUS ele atende as regras do SUS?", o:["Nunca.","Sim, no quesito Vigilância Sanitária e regulamentação (Art 197), todas as ações privadas estão sob a tutela normativa do Estado (Anvisa, SUS).","Apenas se cobrar.","Apenas se for filantrópico."], a:1, j:"A relevância pública (CF 197) incide sobre TUDO em saúde, inclusive clínicas não conveniadas via vigilância sanitária e Alvarás."},
{d:"dificil", q:"Na Saúde do Trabalhador, quem pode intervir para paralisar uma máquina que afeta a audição operária?", o:["Somente a OAB local.","O Ministério do Trabalho exclusivamente, proibindo o SUS.","As ações da Vigilância em Saúde do SUS (Lei 8080) intervêm nas condições e ambientes do trabalho.","Apenas o patrão da fábrica operária privada."], a:2, j:"A lei 8080 autoriza a VE e VS a auditar e intervir em ambientes de trabalho insalubres ativamente."},
{d:"dificil", q:"Onde ocorre a discussão sobre repasses de verbas estaduais para os municípios de uma mesma região?", o:["Em sigilo com os prefeitos.","Nos fóruns de pactuação, como a CIB (Comissão Intergestores Bipartite) e sob regência e aprovação dos Conselhos de Saúde.","No senado e na câmara, com aprovação da OMS nas américas e de consórcios da iniciativa europeia centralizada curativista militar de gestão sanitária e hospitalar rural.","Apenas em Washington."], a:1, j:"As Comissões Intergestores e Conselhos pactuam as transferências regionais baseadas nas metas e indicadores de cada município."},
{d:"dificil", q:"O que caracteriza a diretriz bucal de 'Acolhimento com Classificação de Risco' nas urgências?", o:["Atender primeiro quem chegou primeiro na fila, independente da doença orgânica ou da dor infecciosa severa aguda exposta pelo paciente em sofrimento biológico vital humano social e material local estrutural na sala de triagem básica de acolhimento do PSF.","Identificar na demanda espontânea (sem agendamento) quem corre risco biológico grave ou dor crônica (prioridade) frente a queixas estéticas e adiar procedimentos eletivos em favor da Equidade assistencial aguda no posto.","Rejeitar todos que não têm horário marcado, independente do sofrimento.","Dar prioridade para empresários na fila das cirurgias dos CREOs de referência regional de alta complexidade nos consórcios de Brasília intersetoriais federais integrados da união previdenciária."], a:1, j:"Classificação de risco quebra a 'ordem de chegada' para atender pela gravidade (Equidade frente ao sofrimento)."}
];

let questions = [];
let idx = 0;
let score = 0;
let timerInt;
let timeLeft = 60;

function start(diff) {
    questions = db.filter(q => q.d === diff).sort(() => Math.random() - 0.5);
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    idx = 0; score = 0;
    load();
}

function load() {
    const q = questions[idx];
    document.getElementById('prog').innerText = `Questão ${idx + 1} de 40`;
    document.getElementById('question').innerText = q.q;
    const opts = document.getElementById('opts');
    opts.innerHTML = '';
    q.o.forEach((opt, i) => {
        const b = document.createElement('button');
        b.className = 'option';
        b.innerText = opt;
        b.onclick = () => check(i);
        opts.appendChild(b);
    });
    document.getElementById('just').style.display = 'none';
    document.getElementById('next').classList.add('hidden');
    startTimer();
}

function startTimer() {
    clearInterval(timerInt);
    timeLeft = 60;
    document.getElementById('timer').innerText = `00:${timeLeft}`;
    timerInt = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        if(timeLeft <= 0) { clearInterval(timerInt); lock(false); }
    }, 1000);
}

function check(sel) {
    clearInterval(timerInt);
    const btns = document.getElementById('opts').querySelectorAll('.option');
    btns.forEach((b, i) => {
        b.disabled = true;
        if(i === questions[idx].a) b.classList.add('correct');
        else if(i === sel) b.classList.add('wrong');
    });
    if(sel === questions[idx].a) score++;
    lock(true);
}

function lock(answered) {
    const btns = document.getElementById('opts').querySelectorAll('.option');
    btns.forEach(b => b.disabled = true);
    const just = document.getElementById('just');
    just.innerHTML = (answered ? "" : "<strong style='color:var(--err)'>Tempo Esgotado!</strong><br>") + questions[idx].j;
    just.style.display = 'block';
    document.getElementById('next').classList.remove('hidden');
}

function next() {
    idx++;
    if(idx < questions.length) load();
    else end();
}

function end() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('res-screen').classList.remove('hidden');
    document.getElementById('score').innerText = score;
}
</script>
