<head>

<style>
:root{--bg:#f4f4f9;--txt:#333;--card:#fff;--pri:#00695c;--hover:#004d40;--opt:#e7e9eb;--opt-h:#d4d6d9;--suc:#2e7d32;--err:#c62828;--just:#e0f2f1}

body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;transition:all 0.3s}

.theme-btn{background:transparent;color:var(--txt);border:1px solid #ccc}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option{background:var(--opt);color:var(--txt);text-align:left;border:1px solid #ccc;line-height: 1.4;}
.option:hover:not(:disabled){background:var(--opt-h)}
.option.correct{background:var(--suc);color:#fff;border-color:var(--suc)}
.option.wrong{background:var(--err);color:#fff;border-color:var(--err)}
.hidden{display:none}
.diff-btns{display:flex;gap:10px;justify-content:center;margin-top:20px}

.justification{background:var(--just);padding:15px;border-radius:5px;display:none;margin-bottom:15px;font-size:15px;line-height:1.5}

</head>
<body>
<div class="container">
    <div class="header">

        <button class="theme-btn" onclick="document.body.classList.toggle('dark')">🌓 Tema</button>
    </div>
    
    <div id="start-screen">

        <div class="justification" id="just"></div>

        <button style="width:100%" onclick="location.reload()">Voltar ao Menu</button>

</div>

const db = [

{d:"f",q:"O princípio que determina que todos os cidadãos brasileiros têm direito à saúde sem discriminação é a:",o:["Equidade","Universalidade","Integralidade","Regionalização"],a:1,j:"A Universalidade aponta para o direito à vida e acesso igualitário a todos os cidadãos."},
{d:"f",q:"Qual princípio do SUS foca em tratar 'desigualmente os desiguais' para atender necessidades específicas?",o:["Descentralização","Universalidade","Equidade","Hierarquização"],a:2,j:"A Equidade reconhece a diversidade da condição humana, ajustando o sistema para quem precisa mais."},
{d:"f",q:"A Integralidade critica qual visão restrita da saúde?",o:["A descentralização","O financiamento tripartite","O reducionismo biomédico e curativista","O planejamento regional"],a:2,j:"A Integralidade critica o reducionismo biomédico, focando no indivíduo como um todo biopsicossocial."},

{d:"f",q:"Nos Conselhos de Saúde, qual é a porcentagem exigida para representação dos usuários (paridade)?",o:["25%","50%","75%","100%"],a:1,j:"A representação deve ser paritária, onde 50% são utentes (usuários)."},

{d:"f",q:"Segundo os dados apresentados no PPTX, qual percentual de adolescentes brasileiros nunca havia ido ao dentista?",o:["2%","14%","30%","50%"],a:1,j:"As pesquisas mostraram que 14% dos adolescentes nunca haviam ido ao dentista."},
{d:"f",q:"A sigla ESF (criada em 1994) significa:",o:["Equipe de Sobrevivência Familiar","Estrutura do Sistema Federal","Estratégia Saúde da Família","Estudo de Saúde Focada"],a:2,j:"A Estratégia Saúde da Família organiza a atenção básica do SUS."},
{d:"f",q:"As Equipes de Saúde Bucal (ESB) foram inseridas formalmente na ESF em qual período?",o:["1988","1994","2000/2001","2023"],a:2,j:"As equipes de saúde bucal começaram a ser inseridas na ESF nos anos de 2000/2001."},

{d:"f",q:"O que significa a ação de HBS?",o:["Hospital Base Regional","Hemorragia Bucal Severa","Higiene Bucal Supervisionada","Hierarquização Básica"],a:2,j:"Higiene Bucal Supervisionada (HBS) ajuda a gerar autonomia no autocuidado."},

{d:"f",q:"Qual profissional técnico auxilia nas visitas domiciliares capilares na ESF?",o:["O cirurgião-dentista exclusivamente","O Agente Comunitário de Saúde (ACS)","O fisioterapeuta","Apenas médicos"],a:1,j:"O ACS realiza a visita domiciliar rotineira, mantendo forte vínculo comunitário."},

{d:"f",q:"De acordo com a Lei 8142, as Conferências de Saúde reúnem-se a cada:",o:["1 ano","2 anos","4 anos","Semestre"],a:2,j:"A periodicidade obrigatória das Conferências de Saúde é de quatro anos."},
{d:"f",q:"Quem dirige o SUS nos Estados?",o:["A Prefeitura","As Secretarias Estaduais de Saúde","O Governador sozinho","Os Conselhos Regionais"],a:1,j:"A direção estadual cabe às Secretarias Estaduais de Saúde."},
{d:"f",q:"A Vigilância Sanitária faz parte do escopo do SUS?",o:["Não, é do Ministério do Meio Ambiente","Sim, a Lei 8.080 delega sua execução ao SUS","Apenas nas escolas","Apenas nos hospitais"],a:1,j:"O SUS tem competência legal para executar a vigilância sanitária."},
{d:"f",q:"A participação de entidades privadas filantrópicas no SUS tem:",o:["Caráter obrigatório","Preferência em relação às empresas com fins lucrativos","Proibição constitucional","Lucro garantido pelo estado"],a:1,j:"O SUS dá preferência às instituições sem fins lucrativos na contratação complementar."},
{d:"f",q:"Antes do SUS (CF 1988), o acesso à saúde via INAMPS era:",o:["Universal e para todos","Restrito aos trabalhadores com carteira assinada","Focado apenas em indígenas","Totalmente descentralizado"],a:1,j:"O modelo previdenciário limitava o direito de saúde apenas aos contribuintes."},
{d:"f",q:"A quem competia a saúde dos que não tinham carteira assinada antes do SUS?",o:["Ao INAMPS","Às empresas privadas de saúde","Aos hospitais militares","À filantropia e escassas ações de saúde pública"],a:3,j:"Eram indigentes sanitários, dependentes da caridade (Santas Casas) e saúde pública limitada."},
{d:"f",q:"No modelo de Atenção Integral, os serviços focam em:",o:["Hospitalização isolada","Apenas na cura","Promoção, proteção e recuperação da saúde","Isolamento dos doentes"],a:2,j:"A integralidade articula todas as fases da saúde: promoção, prevenção, cura e reabilitação."},

{d:"f",q:"Quem fiscaliza e aprova o Fundo de Saúde no Município?",o:["O Prefeito","O Conselho Municipal de Saúde","O Juiz da comarca","O Ministério Público"],a:1,j:"Os Conselhos de Saúde são responsáveis pelo controle social e financeiro dos fundos."},

{d:"f",q:"O que o Movimento da Reforma Sanitária (MRSB) defendia?",o:["O direito universal à saúde e a redemocratização","O fechamento de hospitais públicos","A saúde paga por empresas","A exclusão dos idosos"],a:0,j:"O MRSB foi o pilar para instaurar a visão da saúde como direito universal."},

{d:"f",q:"Para crianças de 0 a 5 anos, o ingresso na UBS de odontologia deve aproveitar:",o:["A primeira matrícula na escola primária","As campanhas de vacinação para captação precoce","A internação hospitalar","A dor aguda de cárie"],a:1,j:"Aproveitar a vacinação para a primeira consulta odontológica é meta estratégica."},
{d:"f",q:"A 'Intersetorialidade' na saúde bucal significa atuar junto com:",o:["Apenas médicos e enfermeiros","Donos de farmácia","Setores como educação, saneamento, meio ambiente e assistência social","Hospitais terciários"],a:2,j:"A saúde depende de determinantes sociais, necessitando articulação com outras secretarias e setores."},

{d:"m",q:"Na regionalização do SUS, a organização foca em:",o:["Dividir lucros entre prefeitos","Mapear o território e indicadores epidemiológicos para guiar serviços daquela região","Eliminar hospitais locais","Centralizar em Brasília"],a:1,j:"A regionalização mapeia os perfis epidemiológicos locais para alocar recursos com lógica."},

{d:"m",q:"O que o Tratamento Restaurador Atraumático (ART) propicia na atenção básica?",o:["Uso obrigatório de anestesia geral","Abordagem conservadora e de alta cobertura em locais com pouco equipamento (ex: zonas rurais)","Extração rápida de dentes sadio","Apenas uso de remédios analgésicos"],a:1,j:"O ART usa instrumentos manuais e salva dentes sem precisar de cadeiras motorizadas caras."},
{d:"m",q:"Para evitar que a clínica pare por falta de licitações municipais, as Diretrizes propõem:",o:["Que pacientes tragam os materiais de casa","Inclusão de insumos estratégicos essenciais (amálgama, resinas) nas farmácias da UBS com repasse blindado","Fechar o posto aos sábados","Tratar apenas com água oxigenada"],a:1,j:"Garantir materiais na Cesta Básica de Insumos impede a desassistência por burocracias locais."},
{d:"m",q:"Sobre as ações educativas em escolas, as Diretrizes afirmam que o Cirurgião-Dentista:",o:["Deve parar de atender dor na UBS","Deve executá-las sozinho diariamente","Planeja, avalia e apoia, mas a execução frequente cabe aos auxiliares (TSB, ASB, ACS)","É proibido de pisar em escolas"],a:2,j:"Delega-se a execução massiva aos técnicos para otimizar o tempo cirúrgico precioso do CD."},
{d:"m",q:"Nas campanhas de vacinação de idosos, propõe-se usar o contato com os idosos para:",o:["Realizar busca ativa e exames precoces de câncer bucal nas mucosas senis","Distribuir antibióticos","Vender implantes importados","Fazer tratamento ortodôntico estético"],a:0,j:"Campanhas de vacinação são vitais para triar e prevenir o câncer oral avançado em idosos."},
{d:"m",q:"As Diretrizes criticam os horários convencionais das UBS (8h-17h) porque:",o:["São muito perigosos","Dificultam o acesso do adulto trabalhador, empurrando-o para perdas dentárias nas urgências noturnas","Crianças acordam tarde","Dentistas querem folgar cedo"],a:1,j:"É urgente flexibilizar os horários das UBS para englobar a realidade laboral do adulto operário."},
{d:"m",q:"A política propõe que o Cirurgião-Dentista reserve 15% a 25% de sua carga horária para:",o:["Trabalhar em clínicas privadas","Planejamento, capacitação, reunião de equipe e apoio às atividades coletivas","Dar aulas particulares","Atender apenas crianças"],a:1,j:"A hora-planejamento impede a alienação curativa, garantindo gestão estratégica do território."},
{d:"m",q:"Por que os CEOs foram criados em 2004?",o:["Porque 100% da rede básica foi fechada","Porque os serviços especializados representavam míseros 3,5% da oferta, gerando um abismo na endodontia e periodontia pública","Para faturar mais com exodontias","Para vender planos de saúde"],a:1,j:"A rede secundária era quase inexistente. Os CEOs sanaram a enorme demanda reprimida especializada."},
{d:"m",q:"A atenção secundária (CEO) atende os pacientes através de qual lógica de rede do SUS?",o:["Isolamento territorial","Regionalização e Hierarquização, recebendo casos referenciados da atenção básica (porta de entrada)","Pagamento direto de taxas","Fila de espera aleatória nas ruas"],a:1,j:"Os CEOs integram a rede de referência e contrarreferência, subordinados à regulação do território."},
{d:"m",q:"O 'Vínculo' no processo de trabalho da ESF serve para:",o:["Gerar lucro financeiro imediato","Gerar laços de confiança que reduzem automedicação e aumentam a adesão e responsabilização mútua no tratamento","Punição por faltas na clínica","Quebrar o princípio da Integralidade"],a:1,j:"Um paciente vinculado à equipe segue orientações preventivas e não busca os atalhos automedicados."},
{d:"m",q:"A estratégia da Fluoretação das Águas exige Intersetorialidade porque o gestor do SUS precisa:",o:["Atuar isoladamente no consultório do bairro","Articular-se com Agências de Saneamento Ambiental e Prefeituras para garantir a dosagem segura do íon nas ETA's","Comprar flúor estrangeiro importado","Despejar flúor diretamente nos rios"],a:1,j:"O tratamento hídrico foge do controle físico da UBS, exigindo alianças intersetoriais com o saneamento."},
{d:"m",q:"O que as diretrizes propõem sobre extrações dentárias indiscriminadas (mutilação)?",o:["Aumentar em 50% para poupar material","Priorizar procedimentos conservadores e restauradores, invertendo a lógica triste da mutilação nacional","Abolir todas as extrações, mesmo em dor extrema","Fazer apenas extração de sisos"],a:1,j:"A PNSB tenta salvar o dente até ao fim, rompendo com a triste herança exodôntica do Brasil."},
{d:"m",q:"Como as diretrizes encaram as diferenças culturais do paciente na Educação em Saúde?",o:["Repudiam as crenças populares","Evitam a imposição autoritária, adequando as orientações à vida real do paciente para gerar autocuidado efetivo sem culpas","Proíbem o tratamento de imigrantes","Ignoram as diferenças antropológicas"],a:1,j:"Respeitar os hábitos e adaptar o discurso sem autoritarismo gera muito mais eficácia preventiva."},
{d:"m",q:"Sobre a gestante, o Brasil Sorridente propõe que a consulta odontológica no pré-natal seja:",o:["Compulsória e forçada por lei","Obrigatória sob pena de perda de benefícios sociais","Realizada sempre com respeito e consentimento, atuando de forma profilática sem intervenções forçadas ou invasivas autoritárias","Apenas permitida após o parto normal"],a:2,j:"O SUS repele intervenções forçadas. O cuidado gestacional baseia-se na autonomia e prevenção segura."},
{d:"m",q:"O que é o 'Estatuto do SUS' perante a iniciativa privada (Artigo 199 da CF)?",o:["Obriga a privatização do sangue","A assistência é livre, mas no SUS a atuação é complementar por convênio, dando forte primazia e preferência às entidades filantrópicas","Proíbe clínicas particulares fora do SUS","Garante lucro máximo garantido por lei"],a:1,j:"O mercado privado existe, mas o SUS só o chama para complementar os vazios, preferindo filantrópicas."},
{d:"m",q:"Participar da formulação do 'saneamento básico' significa que o SUS (Art 200):",o:["Constrói prédios e tubulações fluviais","Atua normativamente, prevenindo doenças hídricas (cólera, cárie) através das suas vigilâncias ambientais","Lava ruas em épocas de chuva","Vende água purificada mineral"],a:1,j:"As vigilâncias atuam no controle da água e esgoto para erradicar endemias pela raiz ambiental."},
{d:"m",q:"Quais pautas foram aprovadas nas massivas plenárias da 8ª CNS de 1986 na ditadura?",o:["Privatização ampla do INAMPS e sangue","Reforma sanitária profunda: saúde como direito, sistema descentralizado universal e fim da divisão preventiva-curativa excludente","Manutenção da medicina previdenciária apenas","Vacinação unicamente para militares e elites"],a:1,j:"A 8ª CNS forjou o modelo descentralizado, solidário e igualitário do SUS, sepultando o elitismo do INAMPS."},
{d:"m",q:"Qual era a falha técnica do antigo 'Sistema Incremental Escolar' duramente criticado?",o:["Focava apenas em idosos de asilos rurais","Focava apenas nas escolas, abandonando adolescentes, adultos e gestantes à exodontia maciça nas urgências de dor tardias","Atendia demasiadas especialidades endodônticas","Tinha excesso de verbas curativas nos prefeitos"],a:1,j:"Ao olhar só para crianças na escola, o sistema negligenciava todo o resto da população, gerando mutilados em massa."},
{d:"m",q:"Quem organiza politicamente as metas e debate o plano municipal nas cidades brasileiras?",o:["Exclusivamente os donos de hospitais da região","A Conferência avalia diretrizes e o Conselho delibera o Plano, orquestrando fundos e relatórios em conjunto com o Executivo Local","O Senado Federal via decreto impositivo","As empresas de seguro de saúde privadas"],a:1,j:"A democracia participativa (Conselho/Conferência) atua lado a lado com a Secretaria para moldar a ação em saúde."},
{d:"m",q:"O que incentiva os CEOs a reabilitarem Pessoas com Necessidades Especiais (PNE)?",o:["Gera maiores lucros internacionais nas bolsas","O imperativo da Equidade: garantir que pessoas com barreiras motoras/mentais graves tenham acesso seguro à sedação e cura negadas historicamente pelo mercado","Proibição legal de anestesia local leve","Pressão de farmacêuticas de estética comercial"],a:1,j:"A Equidade força o sistema público a estruturar centros aptos a acolher quem o mercado sempre excluiu por dificuldade clínica."},

/* ================= DIFÍCEIS (40) ================= */
{d:"d",q:"De acordo com a CF de 1988 (Art. 197), ao dispor que as ações de saúde são de relevância pública, autoriza-se o Estado a:",o:["Privatizar 100% da vigilância.","Delegar a execução clínica a terceiros (privados), mantendo inalienável o dever estatal de regulamentar, controlar e fiscalizar rigorosamente a rede inteira.","Se desobrigar legalmente de fiscalizar UPAs.","Vender a rede básica a investidores estrangeiros."],a:1,j:"A execução pode ser mista (privada), mas o Estado NUNCA perde o poder de regulação/auditoria."},
{d:"d",q:"O inciso III do Art. 198 (CF) que consagra a 'participação da comunidade' foi regulado de que forma?",o:["Pela Lei Maria da Penha unicamente.","Pela Lei 8.142/90, que obriga a formação paritária de Conselhos e Conferências como condição impositiva para o repasse de verbas federais (fundo a fundo).","Pela lei do menor preço em licitações curativas.","Apenas por votações simbólicas anuais no congresso."],a:1,j:"A Lei 8142 transformou o artigo da CF na obrigatoriedade estrutural do Controle Social nas cidades e estados."},
{d:"d",q:"O que a Lei 8.080 inova ao colocar 'Vigilância Sanitária e Saúde do Trabalhador' na alçada do SUS?",o:["Não inova, mantendo a medicina isolada.","Rompe a matriz hospitalocêntrica curativa: o SUS ganha autoridade legal para auditar ambientes, poluições químicas laborais e focar na prevenção de riscos ambientais estruturais severos.","Delega a hospitais o poder judicial penal.","Cria prisões federais exclusivas de saúde."],a:1,j:"O SUS atua ativamente nas empresas, águas e indústrias, não sendo um mero tratador de doenças instaladas."},
{d:"d",q:"Qual o conceito prático subjacente à 'Integralidade' na crítica à demanda passiva (apenas esperar a dor na UBS)?",o:["Prender pacientes que faltam.","A Integralidade exige busca ativa no território (ir atrás do risco, rastrear câncer no idoso isolado) e garantir que a reabilitação ocorra sem quebra de fluxo na rede referenciada.","Saber apenas obturar dentes fáceis e enviar os graves para clínicas privadas americanas.","Produzir freneticamente sem importar o vínculo real comunitário."],a:1,j:"Cruza prevenção fora dos muros (território) com a cura dentro deles, resolvendo o problema do doente do começo ao fim."},
{d:"d",q:"O Brasil Sorridente propõe próteses nas UBS (atenção primária) e nos LRPDs. Isso fere a Hierarquização?",o:["Sim, dentes falsos são só de alta complexidade em capitais.","Não. Ao descentralizar procedimentos (fase clínica da prótese) para a UBS, a rede amplia o acesso ao idoso que não pode viajar até ao CEO regional, mantendo a lógica de fluxo laboratorial referenciado e a Equidade inclusiva.","Sim, a constituição proíbe moldes no interior rural.","O SUS impede a entrega de próteses gratuitas."],a:1,j:"'Descer' a prótese para a base não destrói a hierarquia, apenas empodera a resolutividade no território da família carente."},
{d:"d",q:"A Lei 14.572/2023 foi um marco na Política Nacional de Saúde Bucal porque:",o:["Proibiu técnicos auxiliares.","Transformou o 'Brasil Sorridente' em política de Estado fixada na Lei Orgânica (8.080), blindando a saúde bucal contra cortes fáceis de governos de transição frágil.","Privatizou os dentistas das UBS.","Extinguiu prefeituras interioranas."],a:1,j:"Uma política consolidada em Lei protege-se contra extinções ministeriais por decretos ou cortes bruscos."},
{d:"d",q:"O inciso VI do Artigo 200 atrela o SUS a 'fiscalizar e inspecionar águas para consumo humano'. Qual a consequência disso na Odontologia?",o:["Nenhuma, pois água não trata cáries rurais.","Fundamenta a autoridade do SUS em exigir o Heterocontrole da Fluoretação nas companhias hídricas, vigiando rigorosamente as dosagens anticáries terapêuticas para proteger as populações.","Gera multas a garrafas minerais apenas.","Vende refrigerantes em farmácias rurais."],a:1,j:"A vigilância hídrica é o embasamento legal para a prefeitura cobrar o flúor de qualidade e regularidade nas estações de água."},
{d:"d",q:"Por que a prática do atendimento focado só em 'arrancar dente sem volta' viola o Vínculo na ESF?",o:["Porque as pessoas queriam apenas ortodontia grátis imediata.","Esse modelo gera alienação; a PNSB busca a escuta e a corresponsabilização (vínculo), não uma cirurgia mutiladora serial fria sem laços afetivos ou terapêuticos de manutenção futura e preventiva sistêmica real.","Vínculo é ilegal e antiético na medicina.","O acolhimento pune as demoras médicas normais."],a:1,j:"Vínculo significa continuidade. Arrancar o dente como num talho e nunca mais ver o doente rompe com a humanização do cuidado."},
{d:"d",q:"A Portaria 3493 de abril de 2024 atrela pagamentos ao Índice de Equidade e à Qualidade das eSB. Qual a lógica gerencial por trás dos indicadores (ex: Taxa de Exodontia)?",o:["Pagar mais a quem extrai mais dentes limpos no interior.","Se o Estado paga melhor às equipas que preservam dentes (ART) e promovem prevenção, ele usa o financiamento como indutor direto para fixar a ideologia conservadora e humanista da PNSB na cadeira do dentista na prática clínica diária.","Pagar igual, independentemente da excelência do posto no nordeste pobre ou no sudeste rico urbano.","Punir as prefeituras que fazem exames."],a:1,j:"O cofinanciamento baseado em métricas força a equipe a focar na redução de extrações e aumento de tratamentos limpos (ART)."},
{d:"d",q:"A lei nº 8.142 atrela os repasses automáticos federais a FUNDOS e CONSELHOS. Qual o papel central do Fundo de Saúde?",o:["São contas de gastos secretos do prefeito eleito.","É uma conta especial pública, com recursos carimbados da saúde, cuja movimentação é fiscalizada obrigatoriamente e continuamente pelas deliberações populares do Conselho de Saúde aprovado nas metas locais da LDO.","Conta para pagamento de dívidas empresariais privadas.","Fundo exclusivo para leilão de bolsas financeiras globais."],a:1,j:"O fundo protege o dinheiro da saúde; o conselho garante que o prefeito o gaste apenas no que foi pactuado democraticamente."},
{d:"d",q:"Como a diretriz de 'Epidemiologia e informações no território' norteia a prática do Cirurgião-Dentista no PSF?",o:["Lendo revistas trancado em sua sala.","O CD cruza dados de hipertensos ou acamados com CPOD e focos de cárie, planejando ativamente a prevenção onde o risco é maior e indo atrás de lesões atípicas nos idosos da região afetada ativamente pelas equipes do ACS e postos.","Sorteando tratamentos por bairro.","Ele delega 100% da clínica aos técnicos e só faz planilhas em casa."],a:1,j:"O CD usa os números (epidemiologia) para atacar o mal ativamente nas ruas de risco, não apenas esperando o doente na sala de espera."},
{d:"d",q:"O que a 'Direção Única em cada esfera' do Art. 198 (CF) evitou no Brasil pós-1988?",o:["Evitou hospitais privados limpos.","Evitou o caos burocrático de ter União, Estado e Município comandando ações divergentes no mesmo posto local. Agora, o gestor municipal é a autoridade sanitária máxima no seu território, com regras unificadas de repasses complementares e fluxos orgânicos.","Evitou a vacinação pediátrica em massa.","Não evitou nada, as secretarias ainda lutam entre si nas UBS."],a:1,j:"A unificação (municipalização das ações) deu clareza. Na UBS da cidade manda o município; o Estado só apoia tecnicamente a rede referenciada."},
{d:"d",q:"O PPTX levanta os alertas da Emenda Constitucional nº 95. O que o 'Teto de Gastos' impôs criticamente no slide 'Desafios' do SUS?",o:["Um aumento exorbitante salarial.","Um grave 'subfinanciamento' crônico federal. Ao congelar o orçamento, inviabiliza-se a expansão de CEOs, a compra de equipamentos e a estabilidade das equipes via concurso, precarizando o trabalho e desmontando a rede resolutiva da política nas pontas da saúde pública local interiorana isolada.","Diminuiu radicalmente o consumo mundial de açúcar livre.","Encheu as UPAs de recursos internacionais dólares excedentes."],a:1,j:"A EC 95 amarra o financiamento à inflação, impedindo o Estado de investir em mais hospitais e dentistas concursados, precarizando o sistema a longo prazo."},
{d:"d",q:"Ao listar 'substâncias radioativas e psicoativas' no Art. 6º da Lei 8080, qual o escopo do SUS?",o:["Mero passador de multas brandas rurais.","O SUS atua com poder normativo de polícia sanitária em indústrias, equipamentos nucleares de hospitais, agrotóxicos perigosos e farmácias, coibindo ativamente abusos do doping, da indústria e da contaminação do solo com peso do Estado intervencionista protetor constitucional do cidadão operário e comum no país inteiro.","Isenta o SUS de tratar toxicodependentes e doentes industriais fabris de minas orgânicas inorgânicas de metais.","Prender dependentes químicos menores nas ruas locais isoladas."],a:1,j:"A vigilância em saúde dota o SUS de poder de intervenção profunda (inspeção toxicológica/ambiental) na proteção massiva da vida orgânica."},
{d:"d",q:"Ao debater a educação na Saúde Bucal, o que propõe o documento sobre os Cirurgiões-Dentistas formados nas antigas faculdades isoladas?",o:["Que atuem apenas extraindo dentes sem anestesia.","Romper o hiato da formação: investir na Educação Permanente (polos regionais) para integrar a clínica mecanicista elitista de base à visão social sanitarista humanizada multiprofissional (Integralidade) da ESF e dos ciclos territoriais carentes.","Proibir a atuação na iniciativa pública de técnicos em saúde.","Ensinar apenas métodos estéticos lucrativos aos alunos pobres no SUS."],a:1,j:"Como as faculdades velhas ensinavam 'motorzinho e broca' isolados do paciente social, o SUS exige reeducar continuamente a equipa (Educação Permanente em Saúde)."}
];

let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let timerInterval;
let timeLeft = 60;
let selectedLevel = "";

function start(diff) {
    selectedLevel = diff;
    currentQuestions = db.filter(q => q.d === diff).sort(() => Math.random() - 0.5);
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    
    currentQuestionIndex = 0;
    score = 0;
    loadQuestion();
}

function loadQuestion() {
    const qData = currentQuestions[currentQuestionIndex];
    document.getElementById('prog').innerText = `Questão ${currentQuestionIndex + 1} de 40`;
    document.getElementById('question').innerText = qData.q;
    
    const optionsContainer = document.getElementById('opts');
    optionsContainer.innerHTML = '';
    
    qData.o.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = option;
        btn.onclick = () => checkAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });

    document.getElementById('just').style.display = 'none';
    document.getElementById('next').classList.add('hidden');
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 60;
    document.getElementById('timer').innerText = `00:60`;
    timerInterval = setInterval(() => {
        timeLeft--;
        let s = timeLeft < 10 ? '0'+timeLeft : timeLeft;
        document.getElementById('timer').innerText = `00:${s}`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            lockOptions(false);
        }
    }, 1000);
}

function checkAnswer(selectedIndex, btnElement) {
    clearInterval(timerInterval);
    const qData = currentQuestions[currentQuestionIndex];
    const optionsContainer = document.getElementById('opts');
    const buttons = optionsContainer.querySelectorAll('.option');

    buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === qData.a) {
            btn.classList.add('correct');
        } else if (idx === selectedIndex) {
            btn.classList.add('wrong');
        }
    });

    if (selectedIndex === qData.a) {
        score++;
    }

    lockOptions(true);
}

function lockOptions(answered) {
    const btns = document.getElementById('opts').querySelectorAll('.option');
    btns.forEach(b => b.disabled = true);
    
    const justContainer = document.getElementById('just');
    const qData = currentQuestions[currentQuestionIndex];
    
    let prefix = answered ? "" : "<strong style='color:var(--err);'>Tempo esgotado!</strong><br><br>";
    justContainer.innerHTML = prefix + "<strong>Justificativa:</strong> " + qData.j;
    justContainer.style.display = 'block';
    
    document.getElementById('next').classList.remove('hidden');
}

function next() {
    currentQuestionIndex++;
    if (currentQuestionIndex < currentQuestions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('res-screen').classList.remove('hidden');
    document.getElementById('score').innerText = score;
}
</script>
